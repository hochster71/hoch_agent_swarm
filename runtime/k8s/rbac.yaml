apiVersion: v1
kind: ServiceAccount
metadata:
  name: sidecar-worker-sa
  namespace: has-workers
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sidecar-worker-role
  namespace: has-workers
rules:
  - apiGroups: [""]
    resources: ["pods", "configmaps", "events"]
    verbs: ["get", "list", "watch", "create", "patch"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sidecar-worker-rolebinding
  namespace: has-workers
subjects:
  - kind: ServiceAccount
    name: sidecar-worker-sa
    namespace: has-workers
roleRef:
  kind: Role
  name: sidecar-worker-role
  apiGroup: rbac.authorization.k8s.io
