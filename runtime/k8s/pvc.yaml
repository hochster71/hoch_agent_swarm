apiVersion: v1
kind: PersistentVolume
metadata:
  name: tracker-data-pv
spec:
  capacity:
    storage: 10Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-storage
  local:
    path: /tracker-data
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - k3d-has-sidecar-cluster-server-0
                - k3d-has-sidecar-cluster-agent-0
                - k3d-has-sidecar-cluster-agent-1
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tracker-data-pvc
  namespace: has-workers
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: local-storage
  resources:
    requests:
      storage: 10Gi
  volumeName: tracker-data-pv
