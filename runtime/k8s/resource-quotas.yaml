apiVersion: v1
kind: ResourceQuota
metadata:
  name: worker-resource-limits
  namespace: has-workers
spec:
  hard:
    requests.cpu: "2"
    requests.memory: 4Gi
    limits.cpu: "4"
    limits.memory: 8Gi
    pods: "20"
    services: "5"
    persistentvolumeclaims: "5"
---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: critical-agent-priority
value: 1000000
globalDefault: false
description: "Priority class for core coordination agents."
