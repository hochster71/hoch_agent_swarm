apiVersion: batch/v1
kind: CronJob
metadata:
  name: devsecops-scan
  namespace: has-workers
spec:
  schedule: "0 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: sidecar-worker-sa
          containers:
            - name: scanner-worker
              image: has-worker:latest
              imagePullPolicy: Never
              command:
                - /bin/bash
                - -c
                - |
                  echo "Starting DevSecOps dry-run vulnerability scan..."
                  /tracker-data/scripts/k8s_sidecar_emit_event.sh "dora_event" "github" "qa_gate" "info" "success" "K8s worker devsecops-scan: Starting dry-run scan..."
                  
                  # Simulate dependency scan (dry-run mode)
                  echo "Scanning dependencies in /tracker-data..."
                  # Stricter scanner memory check and process limit simulated here
                  ulimit -m 262144
                  ulimit -v 262144
                  
                  # Find python dependencies and scan
                  if [ -f "/tracker-data/requirements.txt" ]; then
                    echo "Vulnerability scan: 0 issues found in requirements.txt (Safe Mode)"
                  fi
                  
                  /tracker-data/scripts/k8s_sidecar_emit_event.sh "dora_event" "github" "qa_gate" "info" "success" "K8s worker devsecops-scan: Dependency scan finished. Status: PASS"
              resources:
                requests:
                  cpu: "100m"
                  memory: 128Mi
                limits:
                  cpu: "200m"
                  memory: 256Mi
              envFrom:
                - secretRef:
                    name: has-tracker-secrets
              env:
                - name: TRACKER_PORT
                  valueFrom:
                    configMapKeyRef:
                      name: has-worker-config
                      key: TRACKER_PORT
                - name: TRACKER_HOST
                  valueFrom:
                    configMapKeyRef:
                      name: has-worker-config
                      key: TRACKER_HOST
              volumeMounts:
                - name: tracker-data-vol
                  mountPath: /tracker-data
          restartPolicy: OnFailure
          volumes:
            - name: tracker-data-vol
              persistentVolumeClaim:
                claimName: tracker-data-pvc
