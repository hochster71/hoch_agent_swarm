apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: has-sidecar-cluster
servers: 1
agents: 2
image: rancher/k3s:v1.27.4-k3s1
ports:
  - port: 8082:80
    nodeFilters:
      - loadbalancer
volumes:
  - volume: /Users/michaelhoch/hoch_agent_swarm:/tracker-data
    nodeFilters:
      - server:*
      - agent:*
options:
  k3d:
    wait: true
    timeout: 360s
  k3s:
    extraArgs:
      - arg: --tls-san=127.0.0.1
        nodeFilters:
          - server:*
  kubeconfig:
    updateDefaultKubeconfig: true
    switchCurrentContext: true
