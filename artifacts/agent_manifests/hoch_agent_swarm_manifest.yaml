# Hoch Agent Swarm Bounded Hyper-Agent Archetypes Manifest
version: "1.0.0"

# Hard Constraints
constraints:
  max_archetypes: 42
  max_spawned_agents_per_run: 12
  max_task_depth: 6
  max_delegation_depth: 2

# Human Approval Policy
human_approval_required_for:
  - file_writes_outside_project_root
  - shell_commands_mutating_files
  - network_calls
  - credential_access
  - deployments
  - sending_emails_messages_calendar_updates
  - purchases
  - destructive_operations

# Hyper-Agent Archetypes
archetypes:
  ceo:
    domain: product
    mode: synthesizer
    tool_access: write_gated
    memory_scope: project_local
    risk_level: medium
    description: "Chief Executive Officer. Leads the swarm, drives strategy, and oversees final integration plan."

  cfo:
    domain: security
    mode: reviewer
    tool_access: admin_gated
    memory_scope: project_local
    risk_level: high
    description: "Chief Financial Officer. Ensures platform stability, tracks performance, and manages security audit risk."

  coo:
    domain: strategy
    mode: planner
    tool_access: read_only
    memory_scope: project_local
    risk_level: medium
    description: "Chief Operating Officer. Designs topological graphs, coordinates execution, and manages daily operations."

  cio:
    domain: ops
    mode: executor
    tool_access: read_only
    memory_scope: task_local
    risk_level: low
    description: "Chief Information Officer. Maps compute resources and dynamic leases, and dynamically assembles compliant agent configurations."

  cmo:
    domain: strategy
    mode: synthesizer
    tool_access: read_only
    memory_scope: long_term
    risk_level: low
    description: "Chief Marketing Officer. Synthesizes individual task reports and represents the brand across release candidates."

  cro:
    domain: ops
    mode: planner
    tool_access: write_gated
    memory_scope: project_local
    risk_level: medium
    description: "Chief Revenue Officer. Schedules execution pipelines, manages targets, and optimizes process routing."
