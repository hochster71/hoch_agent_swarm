<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>HOCH NEURO — live</title>
<style>
  :root{--ink:#e9eef6;--mut:#7f8ba0;--cy:#22d3ee;--gr:#34d399;--gd:#fbbf24;--vi:#a78bfa;
    --art:#ff3b5c;--art2:#ff7a63;--mono:ui-monospace,SFMono-Regular,Menlo,monospace}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;color:var(--ink);
    background:radial-gradient(1200px 800px at 50% 32%,#0a1020 0%,#05070e 55%,#020308 100%);
    font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;overflow-x:hidden}
  .top{display:flex;align-items:center;gap:12px;padding:14px 22px}
  .mark{font-weight:900;letter-spacing:5px;font-size:18px}.mark b{color:var(--art)}
  .badge{padding:4px 12px;border-radius:4px;font-size:11px;font-weight:800;letter-spacing:1px;
    clip-path:polygon(8px 0,100% 0,calc(100% - 8px) 100%,0 100%)}
  .b-live{background:rgba(52,211,153,.14);color:var(--gr);border:1px solid var(--gr)}
  .b-off{background:rgba(255,59,92,.16);color:var(--art);border:1px solid var(--art)}
  .b-sample{background:rgba(251,191,36,.14);color:var(--gd);border:1px solid var(--gd)}
  .ts{margin-left:auto;color:var(--mut);font-family:var(--mono);font-size:12px}
  .stage{display:block;width:100%;max-width:1200px;margin:0 auto;height:auto}
  .hud{max-width:1160px;margin:2px auto 26px;display:grid;grid-template-columns:repeat(7,1fr);gap:9px;padding:0 16px}
  @media(max-width:820px){.hud{grid-template-columns:repeat(2,1fr)}}
  .tile{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.09);padding:10px 12px;border-radius:9px}
  .tl{font-size:9px;letter-spacing:1.3px;color:var(--mut);text-transform:uppercase}
  .tv{font-size:18px;font-weight:800;font-family:var(--mono);margin-top:3px}
  .foot{max-width:1160px;margin:0 auto 40px;padding:0 22px;color:var(--mut);font-size:11px;font-family:var(--mono)}
  .lbl{font-size:10px;font-weight:700;letter-spacing:.4px}.med{font-size:8px;fill:var(--mut);letter-spacing:.3px}
  .lead{stroke:rgba(255,255,255,.16);stroke-width:.8;fill:none}
  @keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.02)}}
  @keyframes flick{0%,100%{opacity:.35}50%{opacity:.95}}
</style>
</head>
<body>
<div class="top">
  <div class="mark">HOCH<b>·</b>NEURO</div>
  <span class="badge b-sample" id="conn">CONNECTING…</span>
  <span class="ts" id="ts">—</span>
</div>

<svg class="stage" viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg">
<defs>
  <radialGradient id="cortex" cx="50%" cy="42%" r="62%">
    <stop offset="0%" stop-color="#1b2740"/><stop offset="60%" stop-color="#111a2e"/><stop offset="100%" stop-color="#0a1020"/>
  </radialGradient>
  <linearGradient id="artery" x1="0" y1="1" x2="0" y2="0">
    <stop offset="0%" stop-color="#7a0f22"/><stop offset="55%" stop-color="#ff3b5c"/><stop offset="100%" stop-color="#ff9a7a"/>
  </linearGradient>
  <radialGradient id="core" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#bff2ff"/><stop offset="55%" stop-color="#22d3ee"/><stop offset="100%" stop-color="#0b5566"/>
  </radialGradient>
  <filter id="glow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="3.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="bigglow" x="-120%" y="-120%" width="340%" height="340%"><feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>

<!-- ===== CEREBRUM (brain body) ===== -->
<g id="brainbody" style="transform-origin:600px 330px;animation:breathe 6s ease-in-out infinite">
  <!-- organic hemispheres -->
  <path d="M600,120
           C 470,110 360,170 330,270
           C 300,360 330,470 430,520
           C 500,556 560,540 600,520
           C 640,540 700,556 770,520
           C 870,470 900,360 870,270
           C 840,170 730,110 600,120 Z"
        fill="url(#cortex)" stroke="#2a3category" stroke-width="0"/>
  <path d="M600,120 C 470,110 360,170 330,270 C 300,360 330,470 430,520 C 500,556 560,540 600,520 C 640,540 700,556 770,520 C 870,470 900,360 870,270 C 840,170 730,110 600,120 Z"
        fill="none" stroke="#3a4a6a" stroke-width="1.5" opacity=".7"/>
  <!-- central longitudinal fissure -->
  <path d="M600,124 C 592,220 608,330 600,430 C 596,470 604,500 600,516" stroke="#26324e" stroke-width="3" fill="none" opacity=".8"/>
  <!-- gyri / sulci (folds) -->
  <g stroke="#33436a" stroke-width="1.1" fill="none" opacity=".55">
    <path d="M380,250 q40,-30 80,-6 q40,24 78,-2 q36,-22 62,4"/>
    <path d="M360,320 q50,-24 96,0 q44,22 86,-4 q30,-18 56,6"/>
    <path d="M380,390 q46,-22 92,2 q42,20 84,-4"/>
    <path d="M640,250 q40,-26 78,-4 q36,20 66,0"/>
    <path d="M642,320 q46,-22 90,2 q30,16 54,-2"/>
    <path d="M640,390 q44,-20 86,2 q26,12 48,-2"/>
    <path d="M430,460 q46,-18 90,4 q40,18 78,-2 q34,-16 62,4"/>
  </g>
</g>

<!-- cerebellum + brainstem (relay / mesh) -->
<path d="M540,540 q60,50 120,0 q-10,42 -60,50 q-50,-8 -60,-50 Z" fill="#131d33" stroke="#3a4a6a" stroke-width="1.2" opacity=".85"/>
<g stroke="#2b3a5a" stroke-width="1" opacity=".5" fill="none"><path d="M555,552 q45,26 90,0"/><path d="M560,566 q40,20 80,0"/></g>
<path d="M594,590 L594,648 M606,590 L606,648" stroke="#3a4a6a" stroke-width="3" opacity=".7"/>

<!-- ===== ARTERIES = TRANSPORTS (glowing vessels + blood flow) ===== -->
<g fill="none" stroke="url(#artery)" filter="url(#glow)" stroke-linecap="round">
  <!-- basilar trunk up the brainstem (Tailscale mesh backbone) -->
  <path id="a-trunk" d="M600,648 C 600,600 598,560 600,516" stroke-width="5"/>
  <!-- circle of willis-ish split -->
  <path id="a-mca-l" d="M600,516 C 560,470 500,430 430,410 C 380,396 350,360 360,320" stroke-width="4"/>
  <path id="a-mca-r" d="M600,516 C 640,470 700,430 770,410 C 820,396 850,360 840,320" stroke-width="4"/>
  <path id="a-aca"   d="M600,516 C 600,440 600,360 600,250" stroke-width="3.5"/>
  <path id="a-pca-l" d="M600,516 C 540,500 470,486 420,470" stroke-width="3"/>
  <path id="a-pca-r" d="M600,516 C 660,500 730,486 780,470" stroke-width="3"/>
  <!-- distal branches -->
  <path d="M360,320 C 340,280 360,250 400,240" stroke-width="2"/>
  <path d="M840,320 C 860,280 840,250 800,240" stroke-width="2"/>
  <path d="M600,250 C 560,220 540,200 560,180 M600,250 C 640,220 660,200 640,180" stroke-width="2"/>
</g>
<!-- blood-flow particles -->
<g fill="#ff5570" filter="url(#glow)" id="flow">
  <circle r="3.4"><animateMotion dur="2.2s" repeatCount="indefinite" path="M600,648 C 600,600 598,560 600,516"/></circle>
  <circle r="3"><animateMotion dur="2.8s" repeatCount="indefinite" path="M600,516 C 560,470 500,430 430,410 C 380,396 350,360 360,320"/></circle>
  <circle r="3"><animateMotion dur="2.8s" begin=".5s" repeatCount="indefinite" path="M600,516 C 640,470 700,430 770,410 C 820,396 850,360 840,320"/></circle>
  <circle r="2.6"><animateMotion dur="2.4s" begin=".3s" repeatCount="indefinite" path="M600,516 C 600,440 600,360 600,250"/></circle>
  <circle r="2.6"><animateMotion dur="3s" begin=".8s" repeatCount="indefinite" path="M600,516 C 540,500 470,486 420,470"/></circle>
  <circle r="2.6"><animateMotion dur="3s" begin="1.1s" repeatCount="indefinite" path="M600,516 C 660,500 730,486 780,470"/></circle>
</g>

<!-- ===== HAS CORE (thalamus / command) ===== -->
<circle cx="600" cy="470" r="30" fill="url(#core)" filter="url(#bigglow)"/>
<text x="600" y="467" text-anchor="middle" font-size="14" font-weight="900" fill="#04121a">HAS</text>
<text x="600" y="480" text-anchor="middle" font-size="7" fill="#04121a">thalamus · core</text>

<!-- ===== region labels: anatomy -> factory (leader lines) ===== -->
<g class="lbl" fill="#e9eef6">
  <line class="lead" x1="440" y1="250" x2="250" y2="200"/><text x="120" y="196">HASF</text><text x="120" y="209" class="med">frontal lobe · app forge</text>
  <line class="lead" x1="760" y1="250" x2="950" y2="200"/><text x="1080" y="196" text-anchor="end">HSF</text><text x="1080" y="209" text-anchor="end" class="med">parietal · storybook</text>
  <line class="lead" x1="430" y1="410" x2="230" y2="430"/><text x="120" y="426">HRF</text><text x="120" y="439" class="med">temporal · research</text>
  <line class="lead" x1="770" y1="410" x2="970" y2="430"/><text x="1080" y="426" text-anchor="end">HMF</text><text x="1080" y="439" text-anchor="end" class="med">occipital · music</text>
  <line class="lead" x1="600" y1="570" x2="600" y2="642"/><text x="600" y="660" text-anchor="middle">relay-001</text><text x="600" y="672" text-anchor="middle" class="med">brainstem · always-on</text>
</g>

<!-- ===== artery labels: medical -> transport ===== -->
<g class="lbl" fill="#ff9a8a">
  <text x="300" y="352">MCA → Harness pipeline</text><text x="300" y="364" class="med">middle cerebral artery</text>
  <text x="628" y="300">ACA → API route</text><text x="628" y="312" class="med">anterior cerebral artery</text>
  <text x="470" y="655">Basilar → Tailscale mesh</text><text x="470" y="667" class="med">basilar trunk · SC</text>
</g>

<!-- EKG heartbeat -->
<polyline id="ekg" points="60,700 300,700 320,700 330,676 344,720 356,690 372,700 1140,700" fill="none" stroke="#34d399" stroke-width="1.6" opacity=".8" filter="url(#glow)"/>
</svg>

<div class="hud">
  <div class="tile"><div class="tl">Pulse · cycle</div><div class="tv" id="v-cyc" style="color:var(--art)">—</div></div>
  <div class="tile"><div class="tl">Posture</div><div class="tv" id="v-post" style="color:var(--gd)">—</div></div>
  <div class="tile"><div class="tl">Worker</div><div class="tv" id="v-work" style="color:var(--gr)">—</div></div>
  <div class="tile"><div class="tl">Agents</div><div class="tv" id="v-ag" style="color:var(--cy)">—</div></div>
  <div class="tile"><div class="tl">Northstar phase</div><div class="tv" id="v-ph" style="color:var(--vi);font-size:13px">—</div></div>
  <div class="tile"><div class="tl">RAM</div><div class="tv" id="v-ram">—</div></div>
  <div class="tile"><div class="tl">At door</div><div class="tv" id="v-door" style="color:var(--art)">—</div></div>
</div>
<div class="foot" id="foot">arteries = transports · blood-flow = live runtime · heartbeat = execution cycle · :3012/api/live + /api/northstar · 3s</div>

<script>
(function(){
  var BASE=(location.protocol.startsWith("http"))?location.origin:"http://100.87.18.15:3012";
  var $=function(i){return document.getElementById(i)};
  function conn(c,t){var e=$("conn");e.className="badge "+c;e.textContent=t;}
  function setFlow(rate){ // faster flow + heartbeat when live/active
    document.querySelectorAll("#flow animateMotion").forEach(function(a,i){a.setAttribute("dur",(rate+i*0.2)+"s");});
  }
  async function poll(){
    var live=null,ns=null,code=0;
    try{var r=await fetch(BASE+"/api/live",{cache:"no-store"});code=r.status;live=await r.json();}catch(e){}
    try{var r2=await fetch(BASE+"/api/northstar",{cache:"no-store"});if(r2.ok)ns=await r2.json();}catch(e){}
    if(!live){conn("b-off","● OFFLINE");$("foot").textContent="relay unreachable — open on the HOCH tailnet (last state).";return;}
    var rel=live.relay||{};
    conn(rel.live?"b-live":"b-sample", rel.live?("● NEURO LIVE · RELAY "+code):("● SAMPLE"));
    $("ts").textContent=(live.ts||"").replace("T"," ").replace("+00:00","Z");
    var cy=live.cycle||{}; $("v-cyc").textContent=cy.cycle_id?String(cy.cycle_id).replace("cycle-",""):"—";
    $("v-post").textContent=live.posture||"—"; $("v-work").textContent=live.worker_status||"—";
    $("v-ag").textContent=(rel.measured_agent_count!=null?rel.measured_agent_count:"—");
    $("v-ram").textContent=(rel.ram_pct!=null?(+rel.ram_pct).toFixed(1)+"%":"—");
    $("v-door").textContent=(live.founder_handoff_count!=null?live.founder_handoff_count:"—");
    $("v-ph").textContent=(ns&&ns.phase)?ns.phase:"—";
    setFlow(rel.live?1.6:3.0);
    $("ekg").style.animation="";
  }
  poll(); setInterval(poll,3000);
})();
</script>
</body>
</html>
