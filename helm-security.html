.kpi .n{font-size:22px;font-weight:bold}.kpi .l{color:var(--dim);font-size:11px}

th{color:var(--dim);font-weight:normal}

.CRITICAL{color:var(--crit);font-weight:bold}.HIGH{color:var(--bad)}.MEDIUM{color:var(--warn)}
.bar{height:8px;background:var(--edge);border-radius:4px;overflow:hidden;margin-top:6px}
.bar>i{display:block;height:100%;background:var(--ok)}
.cols{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-top:6px}
.col{background:var(--card);border:1px solid var(--edge);border-radius:8px;padding:8px;min-height:80px}
.col h3{font-size:10px;color:var(--dim);letter-spacing:1px;margin-bottom:6px}
.tk{background:#0e1620;border:1px solid var(--edge);border-radius:6px;padding:6px;margin-bottom:6px;font-size:11px}
.warnbox{background:#2a1a12;border:1px solid var(--warn);border-radius:8px;padding:10px;margin:10px 0;color:var(--warn)}
