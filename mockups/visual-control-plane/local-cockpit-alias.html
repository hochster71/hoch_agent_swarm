<!DOCTYPE html>
<html lang="en">
<head>

  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Global Preview Ops Bar -->
  <header class="global-ops-bar" style="border-bottom: 2px solid var(--accent-cyan);">

    <div class="breadcrumbs">
      <a href="index.html">SWARM</a> / <span class="active">ALIAS</span>

  <main style="padding: var(--space-md);">

    <!-- Embed polished preview -->
    <div style="border: 1px solid var(--border-subtle); border-radius: var(--border-radius-md); overflow: hidden; height: 800px; background: var(--bg-secondary);">
      <iframe src="dashboard-preview.html" style="width: 100%; height: 100%; border: none;"></iframe>
