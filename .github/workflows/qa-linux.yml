name: HAS Linux QA
on:
  pull_request:
  push:
    branches:
      - main
      - develop
      - "rc/**"
      - "feature/**"
  workflow_dispatch:
jobs:
  linux-qa:
    name: Linux QA / Backend / Gates
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Install Python dependencies
        run: |
          uv sync --frozen || uv sync
      - name: Install Node dependencies
        run: |
          npm ci
          if [ -d frontend ] && [ -f frontend/package.json ]; then npm ci --prefix frontend; fi
      - name: Python unit tests
        run: |
          uv run pytest tests/unit -q
      - name: Michael AI tests
        run: |
          if [ -d tests/unit/michael_ai ]; then uv run pytest tests/unit/michael_ai -q; else echo "No Michael AI tests found"; fi
      - name: HELM tests
        run: |
          if [ -d tests/unit/helm ]; then uv run pytest tests/unit/helm -q; else echo "No HELM tests found"; fi
      - name: Apple telemetry non-macOS tests
        run: |
          if [ -d tests/unit/apple_telemetry ]; then uv run pytest tests/unit/apple_telemetry -q; else echo "No Apple telemetry tests found"; fi
      - name: Frontend build
        run: |
          npm run build
      - name: Static safety gates
        run: |
          bash scripts/scan_host_paths.sh
          bash scripts/scan_hardcoded_status.sh
      - name: Anti-fake gate
        run: |
          bash scripts/anti_fake_gate.sh
      - name: Final verifier gate
        run: |
          bash scripts/final_verifier_gate.sh
      - name: Docker metadata checks
        run: |
          bash scripts/docker_gate.sh || true
