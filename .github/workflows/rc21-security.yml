name: RC21 CI Enforced Security Gates

on:
  push:
    branches:
      - master
      - rc21-ci-enforced-security
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  security-events: write

jobs:
  test:
    name: Run Python Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run pytest
        run: uv run pytest -q

  semgrep:
    name: Semgrep Custom Static Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep scan
        run: |
          semgrep scan --config qa/semgrep/hoch-security.yml --error .

  trivy-fs:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy FS Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL'
          scanners: 'vuln,config,secret'

  docker-build-and-trivy-image:
    name: Docker Build and Trivy Image Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build -t hoch_agent_swarm-hoch-app:latest .

      - name: Run Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'hoch_agent_swarm-hoch-app:latest'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL'
          scanners: 'vuln,config,secret'

  sbom:
    name: Generate CycloneDX SBOM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --frozen

      - name: Generate SBOM
        run: |
          mkdir -p artifacts/security
          uvx --from cyclonedx-bom cyclonedx-py environment --spec-version 1.5 --output-format JSON --output-file artifacts/security/sbom-rc21.json

      - name: Upload SBOM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-rc21
          path: artifacts/security/sbom-rc21.json

  compose-validate:
    name: Docker Compose Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Compose Config
        run: |
          # Verify that docker compose config parses successfully and outputs no deprecation warning.
          # We fail if stderr contains "obsolete" to ensure version attribute stays removed.
          docker compose config > compose_output.txt 2> compose_stderr.txt
          cat compose_stderr.txt
          if grep -q "obsolete" compose_stderr.txt; then
            echo "[ERROR] Obsolete compose version attribute detected!"
            exit 1
          fi

  provenance-summary:
    name: Generate Provenance Summary
    runs-on: ubuntu-latest
    needs: [test, semgrep, trivy-fs, docker-build-and-trivy-image, sbom, compose-validate]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Write GitHub Step Summary
        run: |
          echo "## HOCH Swarm rc21 CI Provenance Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit SHA:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **GitHub Run ID:** \`${{ github.run_id }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Python Unit Tests:** PASS" >> $GITHUB_STEP_SUMMARY
          echo "- **Semgrep Custom Scan:** PASS" >> $GITHUB_STEP_SUMMARY
          echo "- **Trivy FS Scan:** PASS (Fail-on-CRITICAL)" >> $GITHUB_STEP_SUMMARY
          echo "- **Docker Image Trivy Scan:** PASS (Fail-on-CRITICAL)" >> $GITHUB_STEP_SUMMARY
          echo "- **Docker Compose validation:** PASS (Version key check clean)" >> $GITHUB_STEP_SUMMARY
          echo "- **SBOM Generated:** Yes (cyclonedx-py v1.5 JSON)" >> $GITHUB_STEP_SUMMARY
          echo "- **Release Recommendation:** GO" >> $GITHUB_STEP_SUMMARY
