name: Supply Chain Provenance
on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  provenance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci
      - name: Run baseline hardening gate
        run: npm run baseline:hardening
      - name: Generate SBOM
        run: npm run supply:sbom
      - name: Generate SLSA-style provenance
        run: npm run supply:provenance
      - name: Generate release manifest
        run: npm run supply:manifest
      - name: Verify release artifacts
        run: npm run supply:verify
      - name: Attest release manifest
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/releases/v0.1.2-SUPPLY-CHAIN-PROVENANCE/release_manifest.json
