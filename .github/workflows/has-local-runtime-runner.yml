name: HAS Local Runtime Runner (macOS self-hosted)

on:
  workflow_dispatch:
  push:
    branches: [ main, develop ]
    paths:
      - 'scripts/**'
      - 'has_live_project_tracker/**'
      - 'docs/evidence/runtime/**'

jobs:
  runtime-proof:
    runs-on: [self-hosted, macOS, ARM64, has-qa-runner]
    steps:
      - uses: actions/checkout@v4

      - name: Verify HAS/HASF Scope Lock
        run: python3 scripts/verify_has_hasf_scope_lock.py

      - name: Verify Visual Authority Doctrine
        run: python3 scripts/verify_visual_authority_doctrine.py

      - name: Verify Workspace Visual Hygiene
        run: python3 scripts/verify_workspace_visual_hygiene.py

      - name: Check Local HAS Runtime (http://127.0.0.1:8765/)
        run: python3 scripts/check_local_has_runtime.py

      - name: Autonomous Facilitation Check
        run: python3 scripts/autonomous_facilitation_check.py

      - name: Update Live UI with Runner Proof
        run: python3 scripts/has_runner_orchestrator.py
