name: HAS Audit Stack

# Standing free-tool audit gate: runs ruff, bandit, pip-audit, npm audit, and trivy on
# every push/PR and uploads the evidence artifact. Blocks only on real security findings
# (dependency CVEs, container CRITICAL/HIGH, bandit HIGH) — see scripts/audit_stack.sh.

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - develop
      - "rc/**"
      - "feature/**"
      - "goal-**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit-stack:
    name: Free audit stack (ruff · bandit · pip-audit · npm · trivy)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install audit tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff bandit pip-audit mypy

      - name: Install trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -y && sudo apt-get install -y trivy

      - name: Run audit stack
        id: audit
        run: |
          bash scripts/audit_stack.sh

      - name: Upload audit evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-stack-evidence
          path: docs/evidence/security/audit_stack_*.md
          if-no-files-found: warn
