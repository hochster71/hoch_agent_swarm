version: '3.8'

services:
  # Gordy Coder: Primary LLM-driven coding agent resolving logic and MVP features
  gordy-coder:
    image: python:3.10-slim
    container_name: gordy_coder_runner
    volumes:
      - ./workspace:/app/workspace
      - ../backend:/app/backend
    working_dir: /app
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
      - NODE_NAME=${NODE_NAME:-gordy-neo-01}
      - AGENT_TYPE=GORDY-CODER
      - CONTROL_PLANE_URL=http://localhost:8000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: >
      python3 -c "import time, sys; print('[GORDY CODER] Specialized home swarm coding agent online, listening for master router requests...'); sys.stdout.flush(); time.sleep(999999)"
    restart: unless-stopped

  # Gordy Compiler: Validates code formatting, dependencies, and runs compile tests
  gordy-compiler:
    image: python:3.10-slim
    container_name: gordy_compiler_runner
    volumes:
      - ./workspace:/app/workspace
    working_dir: /app
    environment:
      - NODE_NAME=${NODE_NAME:-gordy-neo-02}
      - AGENT_TYPE=GORDY-COMPILER
    command: >
      python3 -c "import time, sys; print('[GORDY COMPILER] Syntax checker and code compilation agent online...'); sys.stdout.flush(); time.sleep(999999)"
    restart: unless-stopped

  # Gordy Tester: Automatically generates, executes, and audits unit/integration tests
  gordy-tester:
    image: python:3.10-slim
    container_name: gordy_tester_runner
    volumes:
      - ./workspace:/app/workspace
    working_dir: /app
    environment:
      - NODE_NAME=${NODE_NAME:-gordy-neo-03}
      - AGENT_TYPE=GORDY-TESTER
    command: >
      python3 -c "import time, sys; print('[GORDY TESTER] Continuous integration test runner online...'); sys.stdout.flush(); time.sleep(999999)"
    restart: unless-stopped
