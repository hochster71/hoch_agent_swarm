<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>MOONSHOT · BUILD LIVE</title>
<style>
  :root{--bg:#0a0a0b;--pan:#141416;--bd:#26262a;--ink:#f2f2f4;--mut:#8a8a92;
    --red:#e31937;--cy:#22d3ee;--gr:#34d399;--gd:#fbbf24;--vi:#a78bfa;--mono:ui-monospace,SFMono-Regular,Menlo,monospace}
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(1100px 640px at 50% -12%,#16171b,#0a0a0b 62%);color:var(--ink);
    font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}
  .wrap{max-width:1200px;margin:0 auto;padding:16px 20px 50px}
  .top{display:flex;align-items:center;gap:14px;border-bottom:1px solid var(--bd);padding-bottom:14px}
  .mark{font-weight:900;letter-spacing:3px;font-size:19px}.mark b{color:var(--red)}
  .badge{padding:4px 12px;font-size:11px;font-weight:800;letter-spacing:1px;
    clip-path:polygon(8px 0,100% 0,calc(100% - 8px) 100%,0 100%)}
  .b-live{background:rgba(52,211,153,.15);color:var(--gr);border:1px solid var(--gr)}
  .b-off{background:rgba(227,25,55,.15);color:var(--red);border:1px solid var(--red)}
  .b-sample{background:rgba(251,191,36,.14);color:var(--gd);border:1px solid var(--gd)}
  .ts{margin-left:auto;color:var(--mut);font-family:var(--mono);font-size:12px}
  /* northstar rail */
  .ns{margin-top:16px;background:var(--pan);border:1px solid var(--bd);padding:14px 16px;
    clip-path:polygon(0 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%)}
  .ns .goal{font-size:15px;font-weight:700}.ns .goal span{color:var(--mut);font-weight:400}
  .rail{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap}
  .step{flex:1;min-width:90px;text-align:center;font-size:10px;letter-spacing:1px;color:var(--mut);
    border-top:2px solid #2a2a2e;padding-top:6px;font-weight:700}
  .step.on{color:var(--cy);border-top-color:var(--cy)}
  .step.done{color:var(--gr);border-top-color:var(--gr)}
  .cols{display:grid;grid-template-columns:1.4fr 1fr;gap:16px;margin-top:16px}
  @media(max-width:820px){.cols{grid-template-columns:1fr}}
  .panel{background:var(--pan);border:1px solid var(--bd);padding:14px 16px}
  .pt{font-size:10px;letter-spacing:1.5px;color:var(--mut);text-transform:uppercase;margin-bottom:10px}
  .feed .row{display:flex;gap:10px;align-items:center;padding:8px 0;border-bottom:1px solid #202024;font-size:13px;font-family:var(--mono)}
  .feed .row:last-child{border-bottom:none}
  .v-ok{color:var(--gr)}.v-no{color:var(--red)}
  .tier{font-size:10px;color:var(--mut);margin-left:auto}
  .door .item{display:flex;gap:8px;align-items:center;border:1px solid var(--bd);padding:9px 11px;margin-bottom:7px;background:#151517}
  .door .none{color:var(--mut);font-size:13px}
  .hud{display:grid;grid-template-columns:repeat(8,1fr);gap:8px;margin-top:16px}
  @media(max-width:820px){.hud{grid-template-columns:repeat(2,1fr)}}
  .tile{background:var(--pan);border:1px solid var(--bd);padding:10px 12px;
    clip-path:polygon(0 0,100% 0,100% calc(100% - 9px),calc(100% - 9px) 100%,0 100%)}
  .tl{font-size:9px;letter-spacing:1px;color:var(--mut);text-transform:uppercase}
  .tv{font-size:17px;font-weight:800;font-family:var(--mono);margin-top:3px}
  .foot{margin-top:16px;color:var(--mut);font-size:11px;font-family:var(--mono)}
  .brain{transform-origin:center;animation:breathe 5s ease-in-out infinite}
  @keyframes breathe{0%,100%{transform:scale(1);opacity:.9}50%{transform:scale(1.06);opacity:1}}
  @keyframes tw{0%,100%{opacity:.3}50%{opacity:1}}
  @keyframes fin{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="mark">MOONSHOT<b>·</b>BUILD LIVE</div>
    <span class="badge b-sample" id="conn">CONNECTING…</span>
    <span class="ts" id="ts">—</span>
  </div>

  <div class="ns">
    <div class="goal" id="goal">Northstar: <span>—</span></div>
    <div class="rail" id="rail"></div>
    <div style="margin-top:8px;font-size:12px;color:var(--mut);font-family:var(--mono)" id="nsprog">—</div>
  </div>

  <div class="cols">
    <div class="panel feed">
      <div class="pt">Build feed · live</div>
      <div id="feed"><div class="row"><span class="mut">waiting for the swarm…</span></div></div>
    </div>
    <div>
      <div class="panel">
        <div class="pt">Breathing core</div>
        <svg viewBox="0 0 260 150" style="width:100%;height:auto">
          <defs><radialGradient id="c" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#eafeff"/><stop offset="45%" stop-color="#22d3ee"/><stop offset="100%" stop-color="#0b5566"/></radialGradient>
          <filter id="g"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
          <g stroke="#22d3ee" stroke-width="1" opacity=".6"><line x1="130" y1="75" x2="60" y2="35"/><line x1="130" y1="75" x2="210" y2="35"/><line x1="130" y1="75" x2="55" y2="115"/><line x1="130" y1="75" x2="205" y2="115"/><line x1="130" y1="75" x2="130" y2="25"/></g>
          <g fill="#eafeff" filter="url(#g)"><circle cx="60" cy="35" r="4" style="animation:tw 2.1s infinite"/><circle cx="210" cy="35" r="4" style="animation:tw 2.6s infinite .3s"/><circle cx="55" cy="115" r="4" style="animation:tw 2.3s infinite .6s"/><circle cx="205" cy="115" r="4" style="animation:tw 2.9s infinite .2s"/><circle cx="130" cy="25" r="3.5" style="animation:tw 3.1s infinite .5s"/></g>
          <g class="brain" id="brain" style="transform-origin:130px 75px"><circle cx="130" cy="75" r="26" fill="url(#c)" filter="url(#g)"/><text x="130" y="79" text-anchor="middle" font-size="12" font-weight="900" fill="#04121a">HAS</text></g>
        </svg>
        <div style="text-align:center;font-size:11px;color:var(--mut);font-family:var(--mono)" id="moon">MOONSHOT · —</div>
      </div>
      <div class="panel door" style="margin-top:16px">
        <div class="pt">At the door · needs you</div>
        <div id="door"><div class="none">—</div></div>
      </div>
    </div>
  </div>

  <div class="hud">
    <div class="tile"><div class="tl">Relay</div><div class="tv" id="v-relay" style="color:var(--gr)">—</div></div>
    <div class="tile"><div class="tl">Posture</div><div class="tv" id="v-post" style="color:var(--gd)">—</div></div>
    <div class="tile"><div class="tl">Worker</div><div class="tv" id="v-work" style="color:var(--gr)">—</div></div>
    <div class="tile"><div class="tl">Agents</div><div class="tv" id="v-ag" style="color:var(--cy)">—</div></div>
    <div class="tile"><div class="tl">Cycle</div><div class="tv" id="v-cyc">—</div></div>
    <div class="tile"><div class="tl">RAM</div><div class="tv" id="v-ram">—</div></div>
    <div class="tile"><div class="tl">Disk</div><div class="tv" id="v-disk">—</div></div>
    <div class="tile"><div class="tl">Door</div><div class="tv" id="v-door" style="color:var(--red)">—</div></div>
  </div>
  <div class="foot" id="foot">:3012/api/live + /api/northstar · refresh 3s · open on the HOCH tailnet for live telemetry</div>
</div>

<script>
(function(){
  var BASE=(location.protocol.startsWith("http"))?location.origin:"http://100.87.18.15:3012";
  var $=function(i){return document.getElementById(i)};
  var PHASES=["RESEARCH","DESIGN","DEVELOP","VERIFY","PACKAGE","LAUNCH"];
  function conn(cls,txt){var e=$("conn");e.className="badge "+cls;e.textContent=txt;}
  function esc(s){return (s||"").toString().replace(/</g,"&lt;")}

  function renderLive(d,code){
    var r=d.relay||{};
    conn(r.live?"b-live":"b-sample", r.live?("● RELAY "+code+" · LIVE"):("● RELAY "+code+" · SAMPLE"));
    $("ts").textContent=(d.ts||"").replace("T"," ").replace("+00:00","Z");
    $("v-relay").textContent=r.live?"200 LIVE":"SAMPLE";
    $("v-post").textContent=d.posture||"—";
    $("v-work").textContent=d.worker_status||"—";
    $("v-ag").textContent=(r.measured_agent_count!=null?r.measured_agent_count:"—");
    var cy=d.cycle||{};$("v-cyc").textContent=cy.cycle_id?String(cy.cycle_id).replace("cycle-","")+" "+(cy.verdict||""):"—";
    $("v-ram").textContent=(r.ram_pct!=null?(+r.ram_pct).toFixed(1)+"%":"—");
    $("v-disk").textContent=(r.disk_pct!=null?(+r.disk_pct).toFixed(1)+"%":"—");
    $("v-door").textContent=(d.founder_handoff_count!=null?d.founder_handoff_count:"—");
    $("brain").style.animationDuration=(r.live?"3.4s":"6s");
    // fallback build feed from cycles if northstar feed empty
    if(!window._nsFeed){
      var rows=(d.recent||[]).slice(0,7).map(function(e){
        return '<div class="row">'+esc(e.label)+' <span class="'+(e.verdict==="PASS"?"v-ok":"v-no")+'">'+esc(e.verdict)+'</span>'
          +'<span class="tier">'+(e.duration_ms!=null?e.duration_ms+"ms":"")+' · '+(e.done!=null?e.done+" done":"")+'</span></div>';
      }).join("");
      if(rows)$("feed").innerHTML=rows;
    }
  }
  function renderNS(n){
    if(!n||!n.ok){ $("goal").innerHTML='Northstar: <span>none set yet — set one to watch the build</span>'; window._nsFeed=false; return; }
    $("goal").innerHTML='Northstar: <span>'+esc(n.goal||"—")+'</span>';
    var ph=n.phase||"RESEARCH", pi=PHASES.indexOf(ph);
    $("rail").innerHTML=PHASES.map(function(p,i){var c=i<pi?"done":(i===pi?"on":"");return '<div class="step '+c+'">'+p+'</div>';}).join("");
    var pr=n.progress||{};
    $("nsprog").textContent="phase "+ph+" · "+(pr.done||0)+" done · "+(pr.pending||0)+" pending · "+(pr.staged_at_door||0)+" at door"+(pr.deferred_need_code_mode?(" · "+pr.deferred_need_code_mode+" need code-mode"):"");
    var rt=n.recent_tasks||[];
    if(rt.length){ window._nsFeed=true;
      $("feed").innerHTML=rt.slice().reverse().slice(0,8).map(function(t){
        var ok=(t.verified||t.status==="SUCCESS");
        return '<div class="row" style="animation:fin .5s">'+esc(t.task_id||"").slice(-26)
          +' <span class="'+(ok?"v-ok":"v-no")+'">'+(ok?"✓":(t.status||"?"))+'</span>'
          +'<span class="tier">'+esc(t.phase||"")+' · '+esc(t.tier||"")+' · $'+((+t.cost_usd||0).toFixed(4))+'</span></div>';
      }).join("");
    } else window._nsFeed=false;
    var door=n.doorstep||[];
    $("door").innerHTML=door.length?door.map(function(x){return '<div class="item"><span style="color:var(--gd)">◔</span> '+esc(x.title||x.id)+'</div>';}).join("")
      :('<div class="none">'+esc(n.message||"Nothing needs you — the factories are working.")+'</div>');
    var m=n.moonshot||{};$("moon").textContent="MOONSHOT · Epic Fury "+(m.epic_fury_state||"—")+" · live: "+((m.factories_live||[]).join(", ")||"—");
  }
  async function poll(){
    try{var res=await fetch(BASE+"/api/live",{cache:"no-store"});renderLive(await res.json(),res.status);}
    catch(e){conn("b-off","● RELAY · OFFLINE");$("foot").textContent="relay unreachable — open on a device on the HOCH tailnet (showing last state).";}
    try{var r2=await fetch(BASE+"/api/northstar",{cache:"no-store"});if(r2.ok)renderNS(await r2.json());else renderNS(null);}catch(e){renderNS(null);}
  }
  poll(); setInterval(poll,3000);
})();
</script>
</body>
</html>
