[project]
name = "hoch_agent_swarm"
version = "0.1.0"
description = "hoch_agent_swarm using crewAI"
authors = [{ name = "Your Name", email = "you@example.com" }]
requires-python = ">=3.10,<3.14"
dependencies = [
    "crewai[tools]==1.14.7",
    "mcp"
]

[project.scripts]
hoch_agent_swarm = "hoch_agent_swarm.main:run"
run_crew = "hoch_agent_swarm.main:run"
train = "hoch_agent_swarm.main:train"
replay = "hoch_agent_swarm.main:replay"
test = "hoch_agent_swarm.main:test"
run_with_trigger = "hoch_agent_swarm.main:run_with_trigger"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.crewai]
type = "crew"

[tool.uv.sources]
mcp = { path = "./dummy_mcp" }

[dependency-groups]
dev = [
    "pytest>=9.1.1",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
filterwarnings = [
    # CrewAI 1.14.7 internal deprecation warnings — not actionable from this project
    "ignore::DeprecationWarning:crewai.*",
]
