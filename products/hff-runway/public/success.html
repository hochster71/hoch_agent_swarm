<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank you — Runway</title>
  <style>
    body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
      background:#f2f8f5; color:#0e2a24; display:flex; min-height:100vh; align-items:center; justify-content:center; margin:0; }
    .card { background:#fff; border:1px solid #d9e8e1; border-radius:16px; padding:40px; max-width:440px; text-align:center; }
    a { color:#0f9d67; }
  </style>
</head>
<body>
  <div class="card">
    <h1>You're set.</h1>
    <p>Thank you for subscribing to Runway. Upload your bank CSV to generate your first monthly packet.</p>
    <p><a id="gen" href="/app.html">Generate your packet →</a></p>
    <p><a href="/">Back to home</a></p>
  </div>
  <script>
    // Carry the Checkout session_id into the generate page so the first run
    // works immediately (before the webhook-written entitlement is queried).
    (function () {
      var sid = new URLSearchParams(location.search).get('session_id');
      if (sid) {
        var a = document.getElementById('gen');
        a.href = '/app.html?session_id=' + encodeURIComponent(sid);
      }
    })();
  </script>
</body>
</html>
