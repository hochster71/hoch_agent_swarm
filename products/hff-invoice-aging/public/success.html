<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Purchase complete — Invoice Aging Snapshot</title>
  <style>
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
      color:#12233a; background:#f3f6fb; line-height:1.55; }
    .wrap { max-width:640px; margin:0 auto; padding:80px 24px; }
    .card { background:#fff; border:1px solid #dbe4f0; border-radius:16px; padding:32px; }
    h1 { margin:0 0 12px; }
    a.btn { display:inline-block; margin-top:20px; padding:14px 22px; border-radius:12px;
      background:#2563c9; color:#fff; font-weight:700; text-decoration:none; }
    .muted { color:#546981; font-size:14px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Payment received ✓</h1>
      <p>Thanks — your one-time purchase is complete. Generate your aging report now; your purchase link
        lets you re-download it too.</p>
      <a class="btn" id="go" href="/app.html">Generate my report →</a>
      <p class="muted" id="sess"></p>
    </div>
  </div>
  <script>
    const params = new URLSearchParams(location.search);
    const sid = params.get('session_id');
    if (sid) {
      document.getElementById('go').href = '/app.html?session_id=' + encodeURIComponent(sid);
      document.getElementById('sess').textContent = 'Purchase reference: ' + sid;
    }
  </script>
</body>
</html>
