<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank you — Clarity Briefs</title>
  <style>
    body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
      background:#f6f8fc; color:#12203a; display:flex; min-height:100vh; align-items:center; justify-content:center; margin:0; }
    .card { background:#fff; border:1px solid #e2e8f4; border-radius:16px; padding:40px; max-width:480px; text-align:center; }
    a { color:#2b6cff; }
    .tok { font:13px/1.4 ui-monospace,SFMono-Regular,Menlo,monospace; background:#f2f5fb; border:1px solid #e2e8f4;
      border-radius:8px; padding:10px 12px; margin:14px 0; word-break:break-all; }
    .btn { display:inline-block; margin-top:8px; background:#2b6cff; color:#fff; text-decoration:none;
      font-weight:700; padding:12px 20px; border-radius:12px; }
    .muted { color:#5b6b86; font-size:13px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>You're in.</h1>
    <p>Thank you for your purchase. Your entitlement token is below — it unlocks your brief.</p>
    <div class="tok" id="tok">(loading token…)</div>
    <a class="btn" id="go" href="/request.html">Generate your brief →</a>
    <p class="muted" style="margin-top:18px">Keep this token. It's the same id you can redeem on the
      generate page. A one-off token is good for a single brief; a subscription token is unlimited.</p>
  </div>
  <script>
    // Stripe appends ?session_id={CHECKOUT_SESSION_ID}; that id IS your token.
    var qs = new URLSearchParams(location.search);
    var sid = qs.get('session_id');
    var tokEl = document.getElementById('tok');
    var go = document.getElementById('go');
    if (sid) {
      tokEl.textContent = sid;
      go.href = '/request.html?token=' + encodeURIComponent(sid);
    } else {
      tokEl.textContent = 'No session id in the URL — open the link from your Stripe receipt.';
    }
  </script>
</body>
</html>
