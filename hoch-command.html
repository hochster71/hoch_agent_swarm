<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>HOCH COMMAND — live</title>
<style>
  :root{--bg:#0a0a0b;--pan:#141416;--bd:#26262a;--ink:#f2f2f4;--mut:#8a8a92;
    --red:#e31937;--cy:#22d3ee;--gr:#34d399;--gd:#fbbf24;--vi:#a78bfa;--mono:ui-monospace,SFMono-Regular,Menlo,monospace}
  *{box-sizing:border-box}
  body{margin:0;background:
    radial-gradient(1200px 700px at 50% -10%,#16171b,#0a0a0b 60%);
    color:var(--ink);font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}
  .top{display:flex;align-items:center;gap:14px;padding:16px 22px;border-bottom:1px solid var(--bd)}
  .mark{font-weight:900;letter-spacing:4px;font-size:20px}
  .mark b{color:var(--red)}
  .badge{padding:4px 12px;border-radius:4px;font-size:11px;font-weight:800;letter-spacing:1px;
    clip-path:polygon(8px 0,100% 0,calc(100% - 8px) 100%,0 100%)}
  .b-live{background:rgba(52,211,153,.15);color:var(--gr);border:1px solid var(--gr)}
  .b-off{background:rgba(227,25,55,.15);color:var(--red);border:1px solid var(--red)}
  .b-sample{background:rgba(251,191,36,.14);color:var(--gd);border:1px solid var(--gd)}
  .ts{margin-left:auto;color:var(--mut);font-family:var(--mono);font-size:12px}
  .stage{display:block;width:100%;max-width:1180px;margin:6px auto 0;height:auto}
  .hud{max-width:1180px;margin:6px auto 30px;display:grid;grid-template-columns:repeat(7,1fr);gap:10px;padding:0 16px}
  @media(max-width:820px){.hud{grid-template-columns:repeat(2,1fr)}}
  .tile{background:var(--pan);border:1px solid var(--bd);padding:12px 14px;
    clip-path:polygon(0 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%)}
  .tl{font-size:9.5px;letter-spacing:1.5px;color:var(--mut);text-transform:uppercase}
  .tv{font-size:20px;font-weight:800;font-family:var(--mono);margin-top:4px}
  .bar{height:3px;background:#2a2a2e;margin-top:8px;overflow:hidden}
  .bf{height:100%;width:0;transition:width 1s}
  .foot{max-width:1180px;margin:0 auto 40px;padding:0 22px;color:var(--mut);font-size:11px;font-family:var(--mono)}
  @keyframes breathe{0%,100%{transform:scale(1);opacity:.92}50%{transform:scale(1.06);opacity:1}}
  @keyframes spin{to{transform:rotate(360deg)}}@keyframes rspin{to{transform:rotate(-360deg)}}
  @keyframes tw{0%,100%{opacity:.25}50%{opacity:1}}
</style>
</head>
<body>
<div class="top">
  <div class="mark">HOCH<b>·</b>COMMAND</div>
  <span class="badge b-sample" id="conn">CONNECTING</span>
  <span class="ts" id="ts">—</span>
</div>

<svg class="stage" viewBox="0 0 1180 620" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif,system-ui">
<defs>
  <radialGradient id="core" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#eafeff"/><stop offset="45%" stop-color="#22d3ee"/><stop offset="100%" stop-color="#0b5566"/></radialGradient>
  <linearGradient id="syn" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#22d3ee"/><stop offset="100%" stop-color="#e31937"/></linearGradient>
  <filter id="g" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="gg" x="-120%" y="-120%" width="340%" height="340%"><feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <style>text{fill:#f2f2f4}.mut{fill:#8a8a92}
    .brain{transform-origin:590px 310px;animation:breathe 5s ease-in-out infinite}
    .ring{fill:none;stroke-dasharray:2 11;opacity:.45}.r{transform-origin:590px 310px}</style>
</defs>

<!-- defense-in-depth rings (NIST) -->
<ellipse class="ring r" cx="590" cy="310" rx="540" ry="272" stroke="#3a3a40" style="animation:spin 120s linear infinite"/>
<ellipse class="ring r" cx="590" cy="310" rx="450" ry="228" stroke="#2b6f7a" style="animation:rspin 100s linear infinite"/>
<ellipse class="ring r" cx="590" cy="310" rx="360" ry="184" stroke="#2f9e6b" style="animation:spin 90s linear infinite"/>
<ellipse class="ring r" cx="590" cy="310" rx="270" ry="140" stroke="#7a2531" style="animation:rspin 80s linear infinite"/>
<ellipse class="ring r" cx="590" cy="310" rx="180" ry="96" stroke="#5a6bb5" style="animation:spin 70s linear infinite"/>
<g font-size="9" letter-spacing="2" text-anchor="middle" font-weight="700">
  <text class="mut" x="590" y="52">CM · CHANGE-CONTROL</text>
  <text fill="#2f9e6b" x="590" y="140">SI/CA · VERIFY GATE</text>
  <text fill="#c9455a" x="590" y="184">AU · EVIDENCE LEDGER</text>
  <text fill="#8091d0" x="590" y="226">SC · TAILSCALE MESH · IA FOUNDER GATES</text>
</g>

<!-- factory synapses + packets -->
<g stroke="url(#syn)" stroke-width="1.3" opacity=".5" fill="none">
  <path d="M590,310 L590,120"/><path d="M590,310 L806,180"/><path d="M590,310 L860,310"/><path d="M590,310 L806,440"/>
  <path d="M590,310 L590,500"/><path d="M590,310 L374,440"/><path d="M590,310 L320,310"/><path d="M590,310 L374,180"/>
</g>
<g fill="#22d3ee" filter="url(#g)">
  <circle r="3"><animateMotion dur="2.4s" repeatCount="indefinite" path="M590,310 L590,120"/></circle>
  <circle r="3"><animateMotion dur="2.7s" begin=".4s" repeatCount="indefinite" path="M590,310 L860,310"/></circle>
  <circle r="3"><animateMotion dur="2.6s" begin=".8s" repeatCount="indefinite" path="M590,310 L806,180"/></circle>
  <circle r="3"><animateMotion dur="2.9s" begin="1.2s" repeatCount="indefinite" path="M590,310 L374,440"/></circle>
</g>

<!-- factory nodes -->
<g text-anchor="middle" font-weight="800" font-size="12">
  <g><circle cx="590" cy="120" r="26" fill="rgba(52,211,153,.13)" stroke="#34d399" stroke-width="1.6" filter="url(#gg)"/><text x="590" y="118" fill="#34d399">HASF</text><text x="590" y="130" font-size="6.5" fill="#34d399" font-weight="600" id="hasf-tag">LIVE</text></g>
  <g><circle cx="806" cy="180" r="24" fill="rgba(251,191,36,.12)" stroke="#fbbf24" stroke-width="1.5" filter="url(#gg)"/><text x="806" y="178" fill="#fbbf24">HSF</text><text x="806" y="190" font-size="6.5" fill="#fbbf24" font-weight="600">NEW</text></g>
  <g><circle cx="860" cy="310" r="22" fill="rgba(167,139,250,.10)" stroke="#a78bfa" stroke-width="1.2"/><text x="860" y="314" fill="#a78bfa">HMF</text></g>
  <g><circle cx="806" cy="440" r="22" fill="rgba(167,139,250,.10)" stroke="#a78bfa" stroke-width="1.2"/><text x="806" y="444" fill="#a78bfa">HRF</text></g>
  <g><circle cx="590" cy="500" r="20" fill="rgba(255,255,255,.03)" stroke="#3a3a40" stroke-width="1.1"/><text x="590" y="504" class="mut">HCF</text></g>
  <g><circle cx="374" cy="440" r="20" fill="rgba(255,255,255,.03)" stroke="#3a3a40" stroke-width="1.1"/><text x="374" y="444" class="mut">HFF</text></g>
  <g><circle cx="320" cy="310" r="20" fill="rgba(255,255,255,.03)" stroke="#3a3a40" stroke-width="1.1"/><text x="320" y="314" class="mut">HHF</text></g>
  <g><circle cx="374" cy="180" r="20" fill="rgba(255,255,255,.03)" stroke="#3a3a40" stroke-width="1.1"/><text x="374" y="184" class="mut">HPF</text></g>
</g>

<!-- breathing brain -->
<g class="brain" id="brain">
  <g stroke="url(#syn)" stroke-width="1.2" fill="none" opacity=".8">
    <path d="M590,310 L520,250"/><path d="M590,310 L512,310"/><path d="M590,310 L524,372"/><path d="M590,310 L586,388"/>
    <path d="M590,310 L660,250"/><path d="M590,310 L668,308"/><path d="M590,310 L656,374"/><path d="M590,310 L596,232"/>
  </g>
  <g fill="#eafeff" filter="url(#g)">
    <circle cx="520" cy="250" r="4" style="animation:tw 2.1s infinite"/><circle cx="512" cy="310" r="3.4" style="animation:tw 2.7s infinite .3s"/>
    <circle cx="524" cy="372" r="4" style="animation:tw 2.3s infinite .6s"/><circle cx="586" cy="388" r="3.4" style="animation:tw 3.1s infinite .2s"/>
    <circle cx="660" cy="250" r="4" style="animation:tw 2.5s infinite .5s"/><circle cx="668" cy="308" r="3.4" style="animation:tw 2.9s infinite .1s"/>
    <circle cx="656" cy="374" r="4" style="animation:tw 2.2s infinite .7s"/><circle cx="596" cy="232" r="3.4" style="animation:tw 3.3s infinite .4s"/>
  </g>
  <circle cx="590" cy="310" r="38" fill="url(#core)" filter="url(#gg)"/>
  <text x="590" y="307" text-anchor="middle" font-size="16" font-weight="900" fill="#04121a">HAS</text>
  <text x="590" y="322" text-anchor="middle" font-size="7.5" fill="#04121a">HELM CORE</text>
</g>
</svg>

<div class="hud">
  <div class="tile"><div class="tl">Posture</div><div class="tv" style="color:var(--gd)" id="v-post">—</div></div>
  <div class="tile"><div class="tl">Worker</div><div class="tv" style="color:var(--gr)" id="v-work">—</div></div>
  <div class="tile"><div class="tl">Agents</div><div class="tv" style="color:var(--cy)" id="v-ag">—</div></div>
  <div class="tile"><div class="tl">Cycle</div><div class="tv" id="v-cyc">—</div></div>
  <div class="tile"><div class="tl">RAM</div><div class="tv" id="v-ram">—</div><div class="bar"><div class="bf" id="b-ram" style="background:var(--cy)"></div></div></div>
  <div class="tile"><div class="tl">Disk</div><div class="tv" id="v-disk">—</div><div class="bar"><div class="bf" id="b-disk" style="background:var(--gd)"></div></div></div>
  <div class="tile"><div class="tl">Door queue</div><div class="tv" style="color:var(--red)" id="v-door">—</div></div>
</div>
<div class="foot" id="foot">source :3012/api/live · refresh 3s · breathing = live core · open on the HOCH tailnet for live telemetry</div>

<script>
(function(){
  var URL=(location.protocol.startsWith("http"))?(location.origin+"/api/live"):"http://100.87.18.15:3012/api/live";
  var $=function(i){return document.getElementById(i)};
  function conn(cls,txt){var e=$("conn");e.className="badge "+cls;e.textContent=txt;}
  function bar(i,p){var e=$(i);if(e)e.style.width=Math.max(0,Math.min(100,p))+"%";}
  function render(d){
    var r=d.relay||{};
    conn(r.live?"b-live":"b-sample", r.live?"● LIVE":"● SAMPLE");
    $("ts").textContent=(d.ts||"").replace("T"," ").replace("+00:00","Z");
    $("v-post").textContent=d.posture||"—";
    $("v-work").textContent=d.worker_status||"—";
    $("v-ag").textContent=(r.measured_agent_count!=null?r.measured_agent_count:"—");
    var cy=d.cycle||{}; $("v-cyc").textContent=cy.cycle_id?String(cy.cycle_id).replace("cycle-","")+" "+(cy.verdict||""):"—";
    $("v-ram").textContent=(r.ram_pct!=null?(+r.ram_pct).toFixed(1)+"%":"—"); bar("b-ram",r.ram_pct||0);
    $("v-disk").textContent=(r.disk_pct!=null?(+r.disk_pct).toFixed(1)+"%":"—"); bar("b-disk",r.disk_pct||0);
    $("v-door").textContent=(d.founder_handoff_count!=null?d.founder_handoff_count:"—");
    // breathe faster when actively cycling
    $("brain").style.animationDuration=(r.live?"3.6s":"6s");
  }
  function offline(){conn("b-off","● OFFLINE"); $("foot").textContent="relay unreachable — open on a device on the HOCH tailnet for live data (showing last state).";}
  async function poll(){try{var res=await fetch(URL,{cache:"no-store"});if(!res.ok)throw 0;render(await res.json());}catch(e){offline();}}
  poll(); setInterval(poll,3000);
})();
</script>
</body>
</html>
