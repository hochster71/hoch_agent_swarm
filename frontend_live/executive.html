<!doctype html>
<html lang="en">
<head>
<script src="/frontend_live/helm_auth.js"></script>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#08090c"/>
<title>HELM · EXECUTIVE COMMAND</title>
<style>
:root{
  --bg:#08090c; --panel:#0d0e13; --panel2:#111319; --line:#1b1e26; --line2:#282d38;
  --ink:#dbe0e6; --dim:#79818d; --dim2:#565d69;
  --amber:#f5b942; --amber2:#c8901f; --green:#43b581; --greendim:#12241b;
  --red:#e5484d; --grey:#464d5b; --violet:#a371f7; --sky:#6fb3ff;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;background:
  radial-gradient(120% 60% at 50% -10%, #101319 0%, transparent 55%), var(--bg);
  color:var(--ink);font:13px/1.5 ui-monospace,"SF Mono",Menlo,monospace;
  -webkit-font-smoothing:antialiased;padding-bottom:48px}
a{color:inherit;text-decoration:none}
header{position:sticky;top:0;z-index:20;backdrop-filter:blur(10px);
  background:linear-gradient(180deg,rgba(8,9,12,.94),rgba(8,9,12,.66));
  border-bottom:1px solid var(--line);padding:12px 20px;display:flex;
  justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap}
h1{font-size:13px;letter-spacing:.34em;font-weight:700}
h1 .g{color:var(--amber);text-shadow:0 0 16px rgba(245,185,66,.5)}
.nav{display:flex;gap:6px;flex-wrap:wrap}
.nav a{color:var(--dim);border:1px solid var(--line2);padding:4px 9px;
  border-radius:7px;font-size:10px;letter-spacing:.1em}
main{max-width:1240px;margin:0 auto;padding:18px 20px}
.section{font-size:11px;letter-spacing:.18em;color:var(--dim2);text-transform:uppercase;
  margin:26px 2px 12px;display:flex;align-items:center;gap:10px}
.section::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,var(--line),transparent)}
.fresh{font-size:9.5px;color:var(--dim2);letter-spacing:.06em}

/* ---- HERO: gauge + verdict ---- */
.hero{display:flex;align-items:center;gap:28px;flex-wrap:wrap;
  border:1px solid var(--line);border-radius:18px;padding:22px 26px;
  background:linear-gradient(180deg,var(--panel2),var(--panel))}
.gauge{--p:0;--c:var(--amber);width:160px;height:160px;border-radius:50%;flex-shrink:0;
  display:grid;place-items:center;position:relative;
  background:conic-gradient(var(--c) calc(var(--p)*1%), #171a22 0)}
.gauge::before{content:"";position:absolute;inset:13px;border-radius:50%;background:var(--panel)}
.gauge .val{position:relative;font-size:44px;font-weight:800;letter-spacing:-1px}
.gauge .lab{position:relative;font-size:9px;letter-spacing:.24em;color:var(--dim);margin-top:2px}
.hmeta{flex:1;min-width:280px}
.band{font-size:22px;font-weight:800;letter-spacing:-.3px}
.band .dot{display:inline-block;width:11px;height:11px;border-radius:50%;margin-right:9px;vertical-align:middle}
.proceed{margin-top:12px;font-size:13px;font-weight:700;padding:8px 14px;border-radius:10px;
  display:inline-flex;align-items:center;gap:9px;border:1px solid var(--line2)}
.proceed .p{width:9px;height:9px;border-radius:50%}
.cov{font-size:11px;color:var(--dim);margin-top:12px;line-height:1.6}
.cov b{color:var(--ink)}

/* state colors */
.s-VERIFIED{color:var(--green)} .bg-VERIFIED{background:var(--green)}
.s-DEGRADED{color:var(--amber)} .bg-DEGRADED{background:var(--amber)}
.s-STALE{color:var(--sky)} .bg-STALE{background:var(--sky)}
.s-UNKNOWN{color:var(--dim2)} .bg-UNKNOWN{background:var(--grey)}
.s-MISSION_READY{color:var(--green)} .bg-MISSION_READY{background:var(--green)}
.s-OPERATIONAL_ATTENTION{color:var(--amber)} .bg-OPERATIONAL_ATTENTION{background:var(--amber)}
.s-AT_RISK{color:#f0883e} .bg-AT_RISK{background:#f0883e}
.s-NOT_READY{color:var(--red)} .bg-NOT_READY{background:var(--red)}

/* ---- pillar grid ---- */
.pillars{display:grid;grid-template-columns:repeat(auto-fill,minmax(232px,1fr));gap:12px}
.pill{border:1px solid var(--line2);border-radius:14px;padding:15px 16px;position:relative;
  background:linear-gradient(180deg,var(--panel2),var(--panel));overflow:hidden}
.pill::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--grey)}
.pill.b-VERIFIED::before{background:var(--green)} .pill.b-DEGRADED::before{background:var(--amber)}
.pill.b-STALE::before{background:var(--sky)} .pill.b-UNKNOWN::before{background:var(--grey)}
.pill .pl{font-size:11px;letter-spacing:.1em;color:var(--dim);text-transform:uppercase}
.pill .pv{font-size:30px;font-weight:800;margin-top:5px;letter-spacing:-.5px}
.pill .pv small{font-size:13px;color:var(--dim2);font-weight:600}
.pill .pst{font-size:10.5px;font-weight:700;letter-spacing:.12em;margin-top:2px}
.pill .pd{font-size:10px;color:var(--dim2);margin-top:9px;line-height:1.55;
  max-height:none;word-break:break-word}
.pill .pw{position:absolute;top:14px;right:14px;font-size:9px;color:var(--dim2);letter-spacing:.06em}

/* ---- action panels ---- */
.acts{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:820px){.acts{grid-template-columns:1fr}}
.card{border:1px solid var(--line);border-radius:14px;padding:16px 18px;
  background:linear-gradient(180deg,var(--panel2),var(--panel))}
.card h3{font-size:11px;letter-spacing:.16em;color:var(--dim);text-transform:uppercase;margin-bottom:12px}
.founder-item{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-top:1px solid var(--line)}
.founder-item:first-of-type{border-top:none}
.founder-item .tag{flex-shrink:0;font-size:9px;font-weight:700;letter-spacing:.08em;
  color:#0b0c10;background:var(--amber);padding:3px 7px;border-radius:6px;margin-top:1px}
.founder-item .txt{font-size:11.5px;color:var(--ink);line-height:1.5}
.none{font-size:11.5px;color:var(--green)}
.next .nid{font-size:14px;font-weight:800;color:var(--sky)}
.next .nwhy{font-size:11px;color:var(--dim);margin-top:8px;line-height:1.6}
.next .nst{font-size:11.5px;color:var(--ink);margin-top:10px;line-height:1.55}
.reasons{list-style:none}
.reasons li{display:flex;gap:10px;padding:8px 0;border-top:1px solid var(--line);font-size:11px;line-height:1.5}
.reasons li:first-child{border-top:none}
.reasons .rk{flex-shrink:0;font-weight:800;color:var(--dim2)}
.reasons .rl{font-weight:700}
.err{color:var(--red);font-size:12px;padding:14px;border:1px solid var(--red);border-radius:12px}
.doc{font-size:10px;color:var(--dim2);margin-top:24px;line-height:1.7;max-width:960px}
</style>
</head>
<body>
<header>
  <h1>HELM · <span class="g">EXECUTIVE COMMAND</span></h1>
  <div class="nav">
    <a href="/executive">EXEC</a><a href="/mission">MISSION</a><a href="/roadmap">ROADMAP</a>
    <a href="/pert">WALL</a><a href="/founder">FOUNDER</a><a href="/nist">NIST</a>
  </div>
</header>
<main id="root">
  <div class="section">Mission Assurance Index <span class="fresh" id="fresh">loading…</span></div>
  <div id="hero"></div>

  <div class="section">Pillars — each backed by a real evidence source</div>
  <div class="pillars" id="pillars"></div>

  <div class="section">Founder action &amp; next executable step</div>
  <div class="acts">
    <div class="card"><h3>Requires founder action</h3><div id="founder"></div></div>
    <div class="card next"><h3>Recommended next executable action</h3><div id="next"></div></div>
  </div>

  <div class="section">Why the index is not higher — top 3</div>
  <div class="card"><ul class="reasons" id="reasons"></ul></div>

  <div class="doc" id="doc"></div>
</main>

<script>
const API = "/api/v1/helm/hmai";
const esc = s => String(s==null?"":s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
const fmtAge = s => s==null? "—" : (s<90? Math.round(s)+"s" : s<5400? Math.round(s/60)+"m" : Math.round(s/3600)+"h");

function render(env){
  const d = env.data || {};
  if(d.state === "UNKNOWN"){
    document.getElementById("hero").innerHTML =
      `<div class="err">HMAI UNKNOWN — ${esc(d.reason||"no data")}</div>`;
    return;
  }
  const idx = d.index;
  const band = d.band || "UNKNOWN";
  // gauge color tracks the band, never a fixed green
  const bandColorVar = {MISSION_READY:"--green",OPERATIONAL_ATTENTION:"--amber",
    AT_RISK:"#f0883e",NOT_READY:"--red",UNKNOWN:"--grey"}[band] || "--amber";
  const cvar = bandColorVar.startsWith("--")? `var(${bandColorVar})` : bandColorVar;

  // fresh line
  const fs = env.freshness_seconds;
  document.getElementById("fresh").textContent =
    `observed ${esc(env.observed_at||"")} · goal_state age ${fmtAge(fs)} · coverage ${d.coverage_pct}%`;

  // hero
  const canP = d.can_mission_safely_proceed;
  const proceedColor = canP? "var(--green)" : "var(--red)";
  document.getElementById("hero").innerHTML = `
    <div class="hero">
      <div class="gauge" style="--p:${idx};--c:${cvar}">
        <div class="val" style="color:${cvar}">${idx==null?"—":idx}</div>
        <div class="lab">HMAI / 100</div>
      </div>
      <div class="hmeta">
        <div class="band s-${band}"><span class="dot bg-${band}"></span>${esc(band.replace(/_/g," "))}</div>
        <div class="proceed" style="border-color:${proceedColor}66;color:${proceedColor}">
          <span class="p" style="background:${proceedColor}"></span>
          ${canP? "SAFE TO PROCEED (autonomous ops)" : "DO NOT PROCEED — blockers present"}
        </div>
        <div class="cov">
          <b>${d.pillar_state_counts.VERIFIED}</b> verified ·
          <b>${d.pillar_state_counts.DEGRADED}</b> degraded ·
          <b>${d.pillar_state_counts.STALE}</b> stale ·
          <b>${d.pillar_state_counts.UNKNOWN}</b> unknown<br>
          <span style="color:var(--dim2)">${esc(d.coverage_note||"")}</span>
          ${canP? "" : "<br><span style='color:var(--red)'>Blockers: "+esc((d.proceed_blockers||[]).join(" · "))+"</span>"}
        </div>
      </div>
    </div>`;

  // pillars — colored ONLY by real state
  document.getElementById("pillars").innerHTML = (d.pillars||[]).map(p=>{
    const scoreTxt = p.score==null? `<span style="color:var(--dim2)">N/A</span>` : `${p.score}<small>/100</small>`;
    return `<div class="pill b-${p.state}">
      <div class="pw">w ${p.weight}${p.age_seconds!=null? " · "+fmtAge(p.age_seconds):""}</div>
      <div class="pl">${esc(p.label)}</div>
      <div class="pv">${scoreTxt}</div>
      <div class="pst s-${p.state}">${esc(p.state)}</div>
      <div class="pd">${esc(p.detail)}</div>
    </div>`;
  }).join("");

  // founder action
  const fp = d.founder_only_actions_pending||[];
  document.getElementById("founder").innerHTML = fp.length
    ? fp.map(a=>`<div class="founder-item"><span class="tag">FOUNDER</span><span class="txt">${esc(a)}</span></div>`).join("")
    : `<div class="none">✓ No founder-only actions pending</div>`;

  // next action
  const n = d.recommended_next_action||{};
  document.getElementById("next").innerHTML = n.id
    ? `<div class="nid">${esc(n.id)}</div>
       <div class="nst">${esc(n.statement||"")}</div>
       <div class="nwhy">${esc(n.why||"")}</div>`
    : `<div class="none">No agent-actionable next task published.</div>`;

  // reasons
  document.getElementById("reasons").innerHTML = (d.top_reasons||[]).map((r,i)=>`
    <li><span class="rk">${i+1}</span>
      <span><span class="rl s-${r.state}">${esc(r.label)}</span>
      <span style="color:var(--dim2)"> [${esc(r.state)}${r.score!=null?" · "+r.score:""} · w${r.weight}]</span><br>
      <span style="color:var(--dim)">${esc(r.why)}</span></span></li>`).join("");

  document.getElementById("doc").textContent =
    `source: ${env.source||""} · truth_class: ${env.truth_class||""} · ${d.doctrine||""}`;
}

async function tick(){
  try{
    const headers = (window.HELM_AUTH && window.HELM_AUTH.headers) ? window.HELM_AUTH.headers() : {};
    const r = await fetch(API, {headers, cache:"no-store"});
    if(!r.ok){ throw new Error("HTTP "+r.status); }
    render(await r.json());
  }catch(e){
    document.getElementById("fresh").textContent = "FEED LOST — "+e.message;
  }
}
tick();
setInterval(tick, 5000);
</script>
</body>
</html>
