<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>HOCH PODS THEATER — live</title>
<script src="/frontend_live/helm_auth.js"></script>
<style>
  :root{ --amber:#ffa32c; --amber2:#ffd180; --green:#39d98a; --dim:#3a3a44; --bg:#0a0e14; }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:#cdd3dc;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",Inter,system-ui,sans-serif;overflow:hidden}
  #wrap{position:relative;width:100vw;height:100vh}
  canvas{display:block;width:100%;height:100%}
  header{position:absolute;top:18px;left:24px;right:24px;display:flex;justify-content:space-between;
    align-items:flex-start;pointer-events:none}
  h1{margin:0;font-size:20px;letter-spacing:3px;font-weight:800;color:var(--amber)}
  h1 span{color:#7f8794;font-weight:600;letter-spacing:2px}
  .sub{margin-top:4px;font-size:11px;letter-spacing:2px;color:#6b7280;text-transform:uppercase}
  .stat{text-align:right;font-size:11px;letter-spacing:1px;color:#8b93a1;line-height:1.6}
  .stat b{color:var(--green)}
  footer{position:absolute;bottom:20px;left:0;right:0;text-align:center;pointer-events:none}
  .ready{font-size:15px;letter-spacing:4px;color:var(--amber2);font-weight:700}
  .foot2{margin-top:5px;font-size:10px;letter-spacing:2px;color:#5b626e;text-transform:uppercase}
  .badge{display:inline-block;margin-top:8px;font-size:9px;letter-spacing:1.5px;color:#5b626e;
    border:1px solid #23282f;border-radius:20px;padding:3px 10px}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <header>
    <div><h1>HOCH PODS <span>THEATER</span></h1><div class="sub">Protected Orchestration Domains · live</div></div>
    <div class="stat" id="stat">connecting…</div>
  </header>
  <footer>
    <div class="ready" id="ready">MISSION READY</div>
    <div class="foot2" id="foot2">awaiting operator intent</div>
    <div class="badge">no simulated data · 100% real events · live factory feed</div>
  </footer>
</div>
<script>
const cv=document.getElementById('c'), ctx=cv.getContext('2d');
let W,H,DPR; function resize(){DPR=Math.min(2,devicePixelRatio||1);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';} addEventListener('resize',resize);resize();
const AMBER='255,163,44', AMBER2='255,209,128', GREEN='57,217,138', DIM='90,98,110';
const LANES=['BUILD','REVENUE','EVIDENCE','CYBER SHIELD','REGISTRY','RESEARCH','STORY','PERSONAL CORE'];
let pods=[], agents=[], sweep=0, lastFetch=0, meta={active:0,total:0,at:'—'};

function layout(list){
  const cx=W/2, cy=H/2, R=Math.min(W,H)*0.30;
  pods = list.map((f,i)=>{
    const a=(-Math.PI/2)+ i*(2*Math.PI/list.length);
    return {code:f.code, name:f.name, active:f.active, x:cx+R*Math.cos(a), y:cy+R*Math.sin(a),
            a, pulse:Math.random()*6.28, spawn:Math.random()*60};
  });
}
function spawnAgent(p){
  const cx=W/2, cy=H/2;
  // agent rises from its pod ring and routes to a destination lane (outward)
  const laneA = p.a + (Math.random()-0.5)*0.5;
  const tx = cx + Math.min(W,H)*0.46*Math.cos(laneA), ty = cy + Math.min(W,H)*0.46*Math.sin(laneA);
  agents.push({x:p.x,y:p.y,tx,ty,t:0,life:1,hue:Math.random()<0.5?AMBER2:GREEN,px:p.x,py:p.y});
}
function draw(){
  ctx.fillStyle='rgba(10,14,20,0.34)'; ctx.fillRect(0,0,W,H); // motion trails
  const cx=W/2, cy=H/2, R=Math.min(W,H)*0.30;
  // range rings + radar sweep
  ctx.save();
  for(const rr of [0.18,0.30,0.42]){ ctx.beginPath(); ctx.arc(cx,cy,Math.min(W,H)*rr,0,6.283);
    ctx.strokeStyle='rgba('+AMBER+',0.12)'; ctx.lineWidth=1*DPR; ctx.stroke(); }
  sweep+=0.012; const sa=sweep%(2*Math.PI);
  const g=ctx.createConicGradient? null:null;
  ctx.beginPath(); ctx.moveTo(cx,cy);
  ctx.arc(cx,cy,R*1.35,sa-0.5,sa); ctx.closePath();
  ctx.fillStyle='rgba('+AMBER+',0.05)'; ctx.fill();
  ctx.restore();
  // center
  ctx.beginPath();ctx.arc(cx,cy,4*DPR,0,6.283);ctx.fillStyle='rgba('+AMBER2+',0.9)';ctx.fill();
  // pods
  for(const p of pods){
    p.pulse+=0.05; const glow=(p.active? 0.55:0.14)+(p.active?0.25*Math.sin(p.pulse):0);
    const hue=p.active?AMBER:DIM;
    const rg=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,34*DPR);
    rg.addColorStop(0,'rgba('+hue+','+glow+')'); rg.addColorStop(1,'rgba('+hue+',0)');
    ctx.fillStyle=rg; ctx.beginPath(); ctx.arc(p.x,p.y,34*DPR,0,6.283); ctx.fill();
    ctx.beginPath();ctx.arc(p.x,p.y,7*DPR,0,6.283);
    ctx.fillStyle=p.active?'rgba('+AMBER2+',0.95)':'rgba('+DIM+',0.6)';ctx.fill();
    // ring
    ctx.beginPath();ctx.arc(p.x,p.y,15*DPR,0,6.283);
    ctx.strokeStyle='rgba('+hue+','+(p.active?0.6:0.25)+')';ctx.lineWidth=1.5*DPR;ctx.stroke();
    // label
    ctx.fillStyle=p.active?'rgba('+AMBER2+',0.95)':'rgba('+DIM+',0.8)';
    ctx.font=(11*DPR)+'px -apple-system,sans-serif';ctx.textAlign='center';
    ctx.fillText(p.code, p.x, p.y-24*DPR);
    // active pods emit agents
    if(p.active){ p.spawn--; if(p.spawn<=0){ spawnAgent(p); p.spawn=40+Math.random()*70; } }
  }
  // agents
  for(const a of agents){
    a.t+=0.02; const e=a.t<1? a.t*a.t*(3-2*a.t):1;
    a.px=a.x; a.py=a.y; a.x=a.x+(a.tx-a.x)*0.04; a.y=a.y+(a.ty-a.y)*0.04;
    a.life-= a.t>1?0.03:0.004;
    ctx.beginPath();ctx.moveTo(a.px,a.py);ctx.lineTo(a.x,a.y);
    ctx.strokeStyle='rgba('+a.hue+','+Math.max(0,a.life*0.9)+')';ctx.lineWidth=2.2*DPR;ctx.stroke();
    ctx.beginPath();ctx.arc(a.x,a.y,2.4*DPR,0,6.283);ctx.fillStyle='rgba('+a.hue+','+Math.max(0,a.life)+')';ctx.fill();
  }
  agents=agents.filter(a=>a.life>0);
  requestAnimationFrame(draw);
}
async function pull(){
  try{
    const r=await fetch('/api/v1/helm/factories',{headers:{'Accept':'application/json'}});
    const d=await r.json();
    const F=d.factories||d.by_code||{};
    const list=Object.keys(F).map(code=>{const v=F[code]||{};
      const st=(v.runtime_state||v.state||v.status||'').toString().toUpperCase();
      return {code, name:v.identity||code, active: st==='ACTIVE'||st==='LIVE'||st==='RUNNING'};});
    if(list.length){ layout(list);
      meta.total=list.length; meta.active=list.filter(x=>x.active).length;
      meta.at=(d.observed_at||'').replace('T',' ').slice(0,19)+' UTC';
      document.getElementById('stat').innerHTML='<b>'+meta.active+'</b> / '+meta.total+' pods live<br>'+meta.at;
      document.getElementById('ready').textContent = meta.active>0? 'ALL SYSTEMS · '+meta.active+' PODS LIVE':'MISSION READY';
      document.getElementById('foot2').textContent = meta.active>0? 'agents spinning up · routing to lanes':'awaiting operator intent';
    }
  }catch(e){ document.getElementById('stat').textContent='awaiting live data…'; }
}
pull(); setInterval(pull, 6000); draw();
</script>
</body>
</html>
