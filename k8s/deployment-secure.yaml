---
# Secure Kubernetes Deployment for hoch-api with security best practices

apiVersion: v1
kind: Namespace
metadata:
  name: hoch-swarm
  labels:
    name: hoch-swarm

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hoch-api
  namespace: hoch-swarm

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hoch-api-config
  namespace: hoch-swarm
data:
  LOG_LEVEL: "info"
  PYTHONUNBUFFERED: "1"
  # Security headers and settings
  CORS_ORIGINS: "http://localhost:3000,http://localhost:8080"
  CORS_CREDENTIALS: "true"
  RATE_LIMIT_REQUESTS: "100"
  RATE_LIMIT_PERIOD: "60"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hoch-api
  namespace: hoch-swarm
  labels:
    app: has-api
    version: v1
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: has-api
  template:
    metadata:
      labels:
        app: has-api
        role: api
      annotations:
        seccomp.security.alpha.kubernetes.io/pod: "runtime/default"
        apparmor.security.beta.kubernetes.io/pod: "runtime/default"
    spec:
      serviceAccountName: hoch-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      
      containers:
        - name: api
          image: hoch-api:latest
          imagePullPolicy: Never  # Use local image for development
          
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          
          # Environment from ConfigMap
          envFrom:
            - configMapRef:
                name: hoch-api-config
          
          # Resource limits and requests (prevent DoS)
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          
          # Liveness probe (restart if unhealthy)
          livenessProbe:
            httpGet:
              path: /api/v1/runtime-truth/state
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          
          # Readiness probe (remove from service if not ready)
          readinessProbe:
            httpGet:
              path: /api/v1/runtime-truth/state
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          
          # Startup probe (wait for app startup)
          startupProbe:
            httpGet:
              path: /api/v1/runtime-truth/state
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12  # 60 seconds total
          
          # Security context
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            capabilities:
              drop:
                - ALL
          
          # Volume mounts
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /app/.cache
      
      # Volumes
      volumes:
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir: {}
      
      # Pod disruption budget (high availability)
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - has-api
                topologyKey: kubernetes.io/hostname

---
apiVersion: v1
kind: Service
metadata:
  name: hoch-api
  namespace: hoch-swarm
  labels:
    app: has-api
spec:
  type: ClusterIP
  selector:
    app: has-api
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
  sessionAffinity: None

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: hoch-api-hpa
  namespace: hoch-swarm
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: hoch-api
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: hoch-api-pdb
  namespace: hoch-swarm
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: has-api
