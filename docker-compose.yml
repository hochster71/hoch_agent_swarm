services:
  # Master Cluster Services
  hochster-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: hoch-agent-swarm/hochster-api:latest
    container_name: hochster-api
    environment:
      - HOCHSTER_MODE=control-plane
      - HOCHSTER_MAX_INSTANCES=12
      - HOCHSTER_TOOL_SANDBOX=docker
      - HOCHSTER_AUDIT_ENABLED=true
      - HOCHSTER_CALLBACKS_ENABLED=true
    ports:
      - "8787:8787"
    volumes:
      - hochster-cache:/var/lib/hochster
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - hochster-net

  hochster-worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: hoch-agent-swarm/hochster-worker:latest
    deploy:
      replicas: 4
    environment:
      - HOCHSTER_WORKER_MODE=solver
      - HOCHSTER_ALLOWED_TOOLS=filesystem,shell,docker,tests,security,diff_patch
      - HOCHSTER_READ_ONLY_DOCKER=true
    networks:
      - hochster-net

  # Hardened Application Services
  hoch-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hoch-agent-swarm-app
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    environment:
      SWARM_UI_PORT: "8086"
      PYTHONPATH: "src:."
      HOCH_LOCAL_ONLY: "1"
      UV_CACHE_DIR: "/tmp/uv-cache"
    ports:
      - "8086:8086"
    volumes:
      - ./artifacts:/app/artifacts
      - ./data:/app/data
      - ./docs:/app/docs
      - type: tmpfs
        target: /tmp
        tmpfs:
          mode: 1777
      - type: tmpfs
        target: /run
        tmpfs:
          mode: 1777
      - type: tmpfs
        target: /home/appuser/.cache
        tmpfs:
          mode: 0777
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8086/api/v1/operator/health', timeout=5).read()"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - hochster-net

  screenshot-worker:
    build:
      context: .
      dockerfile: Dockerfile.screenshot
    container_name: hoch-agent-swarm-screenshot-worker
    profiles:
      - screenshots
    environment:
      DASHBOARD_URL: "http://hoch-app:8086"
    volumes:
      - ./artifacts/live_screenshots:/app/artifacts/live_screenshots
    depends_on:
      hoch-app:
        condition: service_healthy
    networks:
      - hochster-net

  test-runner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hoch-agent-swarm-test-runner
    profiles:
      - test
    environment:
      PYTHONPATH: "src:."
    volumes:
      - ./artifacts:/app/artifacts
      - ./data:/app/data
    command: ["uv", "run", "pytest"]
    networks:
      - hochster-net

volumes:
  hochster-cache:

networks:
  hochster-net:
    driver: bridge
