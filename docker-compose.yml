services:
  has-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: has-api
    image: hoch-agent-swarm/has-api:latest
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./docs:/app/docs
      - ./artifacts:/app/artifacts
      - ./config:/app/config
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:8000/api/v1/runtime-truth/state || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - has-net

  has-ui:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: has-ui
    image: hoch-agent-swarm/has-ui:latest
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      has-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8080/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - has-net

  has-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: has-worker
    image: hoch-agent-swarm/has-worker:latest
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - ./backend:/app/backend
      - ./docs:/app/docs
      - ./artifacts:/app/artifacts
      - ./config:/app/config
    depends_on:
      has-api:
        condition: service_healthy
    networks:
      - has-net

  has-tools:
    build:
      context: .
      dockerfile: Dockerfile.tools
    container_name: has-tools
    image: hoch-agent-swarm/has-tools:latest
    profiles:
      - tools
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - ./backend:/app/backend
      - ./docs:/app/docs
      - ./artifacts:/app/artifacts
      - ./config:/app/config
      - ./tests:/app/tests
      - ./scripts:/app/scripts
    networks:
      - has-net

networks:
  has-net:
    driver: bridge
