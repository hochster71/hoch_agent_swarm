coding_agent_policy:
  selection_rules:
    - task_type: "frontend UI fix"
      evaluation_metric: "Playwright pass rate"
      primary_agent: "Claude Code"
      fallback_agent: "Cursor"
    - task_type: "backend API fix"
      evaluation_metric: "pytest/integration pass rate"
      primary_agent: "Claude Code"
      fallback_agent: "Codex CLI"
    - task_type: "security patch"
      evaluation_metric: "Semgrep/gitleaks/trivy pass rate"
      primary_agent: "Semgrep Agent"
      fallback_agent: "Claude Code"
    - task_type: "dependency fix"
      evaluation_metric: "lockfile + security gate pass"
      primary_agent: "Dependency Agent"
      fallback_agent: "Regression Agent"
    - task_type: "doc generation"
      evaluation_metric: "DDLC completeness"
      primary_agent: "Documentation Agent"
      fallback_agent: "Lifecycle Gate Agent"
    - task_type: "refactor"
      evaluation_metric: "regression preservation"
      primary_agent: "Architect Agent"
      fallback_agent: "Regression Agent"
    - task_type: "runtime bug"
      evaluation_metric: "heartbeat/recovery evidence"
      primary_agent: "Claude Code"
      fallback_agent: "Cursor"
    - task_type: "data/schema fix"
      evaluation_metric: "migration tests"
      primary_agent: "Codex CLI"
      fallback_agent: "Architect Agent"
    - task_type: "prompt repair"
      evaluation_metric: "prompt regression tests"
      primary_agent: "Claude Code"
      fallback_agent: "Anti-Fake Agent"
