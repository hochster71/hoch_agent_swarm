# HELM Voice Executive Policy
# Doctrine: no_fake_green · Runtime Truth · founder DOORSTEP
# Speech clients default OFF. API is always available for tool-bound agents.

policy_version: "1.0"
persona: "HELM Executive Mission Commander"

# Client defaults (UI / local TTS)
# voice_mode: local_tts | elevenlabs
# ElevenLabs requires: paid_providers_allowed=true AND ELEVENLABS_API_KEY
#   AND (elevenlabs_enabled=true OR HELM_ELEVENLABS_TTS=1 OR voice_mode=elevenlabs)
voice_enabled_default: false
voice_mode: local_tts
# Repo default is fail-closed. Enable paid TTS via gitignored env:
#   HELM_VOICE_PAID_PROVIDERS=1
#   HELM_ELEVENLABS_TTS=1
#   ELEVENLABS_API_KEY=...
#   (optional) HELM_VOICE_MODE=elevenlabs
paid_providers_allowed: false
elevenlabs_enabled: false
elevenlabs_model_id: eleven_multilingual_v2
speak_secrets: false
require_operator_toggle: true
max_events_per_hour: 30
min_severity: INFO
daily_budget_usd: 0

# --- Phase 2 voice cost enforcement (additive; defaults preserve today's fail-closed posture) ---
# ENFORCED by backend/voice/cost_gate.py as a pre-flight gate in front of every paid TTS call.
# NOTE: the repo's dependency-free YAML loader (backend/voice/policy.py::_parse_yaml_simple)
# only supports one nesting level, so these are FLAT keys rather than the nested `cost:` block
# sketched in docs/evidence/runtime/voice-sidecar-phase-2-design.md §1.4 (documented deviation).
# cost_enabled: master switch; false => paid TTS stays fully blocked (fail-closed)
cost_enabled: false
# per_call_ceiling_usd: hard cap on a single utterance's estimated cost
per_call_ceiling_usd: 0.05
# monthly_budget_usd: calendar-month cap (UTC); 0 = disabled = no paid spend
monthly_budget_usd: 0
# doorstep_on_budget_exhaustion: stage at founder door on ceiling breach instead of spending
doorstep_on_budget_exhaustion: true
# elevenlabs_usd_per_1k_chars is a PLACEHOLDER / UNKNOWN until the founder confirms it against
# live account pricing. It labels an estimate; it is NOT authoritative (no_fake_green).
elevenlabs_usd_per_1k_chars: 0.30
# voice_usage_ledger: append-only NEW file; never an existing runtime ledger
voice_usage_ledger: data/runtime/voice_usage_ledger.jsonl

# Staleness: data older than this is labeled STALE, never LIVE
freshness_budget_seconds: 300

# Command execution classes
# READ_ONLY   — observe Runtime Truth, never mutate
# STAGE_ONLY  — write reversible staging artifacts only (no deploy/spend/keys)
# DOORSTEP    — founder only; voice never executes
allowed_modes:
  - READ_ONLY
  - STAGE_ONLY

doorstep_blocked_verbs:
  - deploy
  - deploy_prod
  - git_push
  - spend
  - stripe_live
  - provision_keys
  - rotate_keys
  - sign
  - notarize
  - app_store_submit
  - move_money
  - clear_release_go
  - bypass_approval

# Secret patterns never spoken (also enforced in sanitizer)
redact_patterns:
  - 'sk-[A-Za-z0-9]{10,}'
  - 'pk_[A-Za-z0-9]{10,}'
  - 'Bearer\s+[A-Za-z0-9._\-]{8,}'
  - '(?i)(api[_-]?key|password|secret|token)\s*[:=]\s*\S+'
  - '/Users/[^\s]+'
  - '-----BEGIN [A-Z ]+PRIVATE KEY-----'

max_speech_chars: 1200

staging_dir: artifacts/voice/staging
audit_log: data/runtime/voice_command_audit.jsonl
