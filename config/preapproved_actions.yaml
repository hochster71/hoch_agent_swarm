preapproved_actions:
  low_risk:
    - action: "Run healthcheck"
      rule: "Auto-approve"
    - action: "Run Playwright tests"
      rule: "Auto-approve"
    - action: "Run build"
      rule: "Auto-approve"
    - action: "Generate evidence markdown"
      rule: "Auto-approve"
    - action: "Update doctrine/evidence docs"
      rule: "Auto-approve"
    - action: "Create backup"
      rule: "Auto-approve"
    - action: "Read files"
      rule: "Auto-approve"
    - action: "Inspect git status"
      rule: "Auto-approve"
    - action: "Query local API endpoint"
      rule: "Auto-approve"
    - action: "Restart local Docker service after safe failure"
      rule: "Auto-approve in gated mode"
  requires_approval:
    - action: "Delete files"
      reason: "Irreversible risk"
    - action: "Modify secrets"
      reason: "Credential risk"
    - action: "Public tunnel/exposure"
      reason: "Security risk"
    - action: "Paid API/cloud dependency"
      reason: "Cost and privacy"
    - action: "Architecture replacement"
      reason: "Violates doctrine"
    - action: "Production release"
      reason: "Command authority"
    - action: "Git history rewrite"
      reason: "Destructive"
    - action: "Docker prune"
      reason: "Data-loss risk"
