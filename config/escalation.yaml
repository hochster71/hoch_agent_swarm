escalation:
  enabled: false
  require_human_approval: true
  daily_budget_usd: 0
  monthly_budget_usd: 0
  allowed_reasons:
    - local_models_failed
    - local_models_disagree
    - high_value_code_review
    - security_risk_review
    - rmf_ato_review
    - executive_final_review
  blocked_task_types:
    - credential_handling
    - secrets_extraction
    - destructive_file_ops
    - money_movement
    - external_network_attack
    - production_deployment_without_approval
  high_risk_keywords:
    - delete
    - destroy
    - credentials
    - password
    - secret
    - token
    - deploy
    - production
    - rmf
    - ato
    - vulnerability
    - exploit
