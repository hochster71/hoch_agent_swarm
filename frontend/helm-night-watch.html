<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<title>HELM Night Watch</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root{--bg:#0b0f14;--card:#121a24;--edge:#1f2d3d;--txt:#c9d7e4;--dim:#6b7f93;
        --ok:#2ecc71;--warn:#f1c40f;--bad:#e74c3c;--acc:#3498db}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--txt);font:13px/1.45 "SF Mono",Menlo,monospace;padding:10px}
  header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
  h1{font-size:16px;letter-spacing:2px;color:var(--acc)}
  #clock{color:var(--dim)} #agg{font-weight:bold}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:10px}
  .card{background:var(--card);border:1px solid var(--edge);border-radius:8px;padding:10px;min-height:120px}
  .card h2{font-size:12px;color:var(--dim);letter-spacing:1px;margin-bottom:6px;display:flex;justify-content:space-between}
  .card.err{border-color:var(--bad);box-shadow:0 0 12px rgba(231,76,60,.35)}
  .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:6px}
  .ok{background:var(--ok)} .warn{background:var(--warn)} .bad{background:var(--bad)}
  pre{white-space:pre-wrap;word-break:break-all;color:var(--txt);font-size:12px;max-height:230px;overflow:auto}
  table{width:100%;border-collapse:collapse;font-size:12px}
  td{padding:2px 6px;border-bottom:1px solid var(--edge)}
  td.k{color:var(--dim)} .g{color:var(--ok)} .y{color:var(--warn)} .r{color:var(--bad)}
  a{color:var(--acc);text-decoration:none}
</style></head><body>
<header>
  <h1>⬢ HELM NIGHT WATCH</h1>
  <div><span id="agg">—</span> · <span id="clock">—</span> · refresh 20s ·
  <a href="/control">control</a> <a href="/board">board</a> <a href="/factoryverse">factoryverse</a></div>
</header>
<div class="grid" id="grid"></div>
<script>
const PANELS = [
  {id:"health",   title:"RELAY HEALTH",     url:"/health"},
  {id:"control",  title:"CONTROL PLANE",    url:"/api/helm-control"},
  {id:"beats",    title:"HEARTBEATS",       url:"/api/heartbeats"},
  {id:"burnin",   title:"BURN-IN STATUS",   url:"/api/burn-in/status"},
  {id:"tickets",  title:"TICKETS",          url:"/api/tickets"},
  {id:"messages", title:"MESSAGES (tail)",  url:"/api/messages"},
  {id:"factory",  title:"FACTORYVERSE",     url:"/api/factoryverse"},
  {id:"registry", title:"AGENT REGISTRY",   url:"/api/registry"},
];
const grid = document.getElementById("grid");
for (const p of PANELS) {
  const el = document.createElement("div");
  el.className = "card"; el.id = "card-" + p.id;
  el.innerHTML = `<h2><span><span class="dot warn" id="dot-${p.id}"></span>${p.title}</span>
    <a href="${p.url}" target="_blank">raw</a></h2><div id="body-${p.id}"><pre>loading…</pre></div>`;
  grid.appendChild(el);
}
function esc(s){return String(s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]))}
function ageSecs(ts){try{return Math.round((Date.now()-new Date(ts).getTime())/1000)}catch(e){return null}}
function fmtAge(s){if(s==null)return "?";if(s<90)return s+"s";if(s<5400)return Math.round(s/60)+"m";return (s/3600).toFixed(1)+"h"}
</script>
<script>
// Panel-specific renderers. Unknown shapes fall back to pretty JSON (truncated).
function fallback(d){return "<pre>"+esc(JSON.stringify(d,null,1).slice(0,1600))+"</pre>"}
function rowTable(pairs){return "<table>"+pairs.map(([k,v,cls])=>
  `<tr><td class="k">${esc(k)}</td><td class="${cls||""}">${v}</td></tr>`).join("")+"</table>"}

function renderControl(d){
  const flags=[["execution_posture", esc(d.execution_posture||"?"), d.execution_posture==="DOORSTEP"?"g":"y"],
    ["allow_provider_api_calls", d.allow_provider_api_calls, d.allow_provider_api_calls?"g":"r"],
    ["allow_ag_execution", d.allow_ag_execution, d.allow_ag_execution?"g":"y"],
    ["allow_founder_gated_execution", d.allow_founder_gated_execution, d.allow_founder_gated_execution?"y":"g"],
    ["agent_allow_code", d.agent_allow_code, d.agent_allow_code?"g":"y"]];
  return {html:rowTable(flags), state: d.allow_provider_api_calls ? "ok" : "bad"};
}
function renderBeats(d){
  const list = Array.isArray(d)?d:(d.heartbeats||d.agents||d.workers||[]);
  if(!Array.isArray(list)||!list.length) return {html:fallback(d), state:"warn"};
  let worst="ok"; const rows=list.slice(0,14).map(b=>{
    const name=b.name||b.agent||b.id||b.worker||"?";
    const ts=b.last_seen||b.ts||b.updated||b.last_heartbeat||b.timestamp;
    const a=ageSecs(ts); const cls=a==null?"y":a<300?"g":a<1800?"y":"r";
    if(cls==="r")worst="bad"; else if(cls==="y"&&worst==="ok")worst="warn";
    return [esc(name), fmtAge(a)+" ago", cls];});
  return {html:rowTable(rows), state:worst};
}
function renderTickets(d){
  const list=Array.isArray(d)?d:(d.tickets||[]);
  if(!Array.isArray(list)) return {html:fallback(d), state:"ok"};
  const open=list.filter(t=>!/done|closed|complete/i.test(t.status||""));
  const rows=open.slice(0,12).map(t=>[esc((t.id||"")+" "+(t.status||"")), esc((t.title||t.summary||"").slice(0,60))]);
  return {html:`<div>open: <b>${open.length}</b> / total ${list.length}</div>`+rowTable(rows), state:"ok"};
}
function renderMessages(d){
  const list=Array.isArray(d)?d:(d.messages||[]);
  if(!Array.isArray(list)) return {html:fallback(d), state:"ok"};
  const rows=list.slice(-8).reverse().map(m=>[esc(m.sender||m.from||"?"),
    esc(String(m.content||m.text||m.body||"").slice(0,80))]);
  return {html:rowTable(rows), state:"ok"};
}
</script>
<script>
function renderBurnin(d){
  const s=(d.status||d.state||"").toString();
  const ok=/run|active|ok|green|pass/i.test(s); const bad=/fail|error|stall|red/i.test(s);
  const pairs=Object.entries(d).slice(0,10).map(([k,v])=>[k, esc(typeof v==="object"?JSON.stringify(v).slice(0,70):v)]);
  return {html:rowTable(pairs), state: bad?"bad":ok?"ok":"warn"};
}
function renderFactory(d){
  const list=Array.isArray(d)?d:(d.factories||d.items||[]);
  if(!Array.isArray(list)||!list.length) return {html:fallback(d), state:"ok"};
  const rows=list.slice(0,14).map(f=>[esc(f.code||f.name||"?"),
    esc(f.status||((f.done_lanes!=null)?`${f.done_lanes}/${f.total_lanes} lanes`:"")||JSON.stringify(f).slice(0,50))]);
  return {html:rowTable(rows), state:"ok"};
}
const RENDER={control:renderControl,beats:renderBeats,tickets:renderTickets,
              messages:renderMessages,burnin:renderBurnin,factory:renderFactory};

async function refresh(){
  document.getElementById("clock").textContent=new Date().toLocaleTimeString();
  let bad=0,warn=0;
  await Promise.all(PANELS.map(async p=>{
    const card=document.getElementById("card-"+p.id), dot=document.getElementById("dot-"+p.id),
          body=document.getElementById("body-"+p.id);
    try{
      const r=await fetch(p.url,{cache:"no-store"});
      if(!r.ok) throw new Error("HTTP "+r.status);
      const text=await r.text(); let d; try{d=JSON.parse(text)}catch(e){d=text}
      const out=(RENDER[p.id]&&typeof d==="object")?RENDER[p.id](d)
                :{html:typeof d==="object"?fallback(d):"<pre>"+esc(String(d).slice(0,900))+"</pre>",state:"ok"};
      body.innerHTML=out.html;
      dot.className="dot "+(out.state==="bad"?"bad":out.state==="warn"?"warn":"ok");
      card.classList.toggle("err",out.state==="bad");
      if(out.state==="bad")bad++; else if(out.state==="warn")warn++;
    }catch(e){
      body.innerHTML="<pre class='r'>"+esc(e.message)+"</pre>";
      dot.className="dot bad"; card.classList.add("err"); bad++;
    }
  }));
  const agg=document.getElementById("agg");
  agg.textContent=bad?`⛔ ${bad} RED`:warn?`⚠ ${warn} WARN`:"● ALL GREEN";
  agg.style.color=bad?"var(--bad)":warn?"var(--warn)":"var(--ok)";
  document.title=(bad?"⛔":warn?"⚠":"●")+" HELM Night Watch";
}
refresh(); setInterval(refresh,20000);
</script>
</body></html>
