<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HOCH — BRAIN Moonshot (HAS × BRAIN × Factories)</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
:root{
  --void:#0B0A14; --deep:#12101F; --panel:#181529; --panel2:#1E1A33;
  --hair:#2A2545; --hair2:#3A3260;
  --genome:#7C6FFF; --genome-dim:#453B8C;
  --spark:#00E5C0; --spark-dim:#0A6B5C;
  --amber:#FFB454; --rose:#FF6B8B; --gold:#F5D547;
  --ink:#E9E6F7; --muted:#9089B8; --muted2:#5F5788;
  --font:'Space Grotesk',system-ui,sans-serif; --mono:'IBM Plex Mono',ui-monospace,monospace;
}
*{box-sizing:border-box}
body{margin:0;background:var(--void);color:var(--ink);font-family:var(--font);font-size:14px;
  background-image:radial-gradient(900px 500px at 85% -8%,rgba(124,111,255,.10),transparent),
                    radial-gradient(700px 450px at 5% 105%,rgba(0,229,192,.07),transparent);}
.mono{font-family:var(--mono)}
.wrap{max-width:1400px;margin:0 auto;padding:22px 26px 60px}
.head{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;margin-bottom:20px;flex-wrap:wrap}
.head h1{font-size:24px;margin:0;font-weight:700;letter-spacing:-.01em}
.head .sub{color:var(--muted);font-size:12.5px;margin-top:4px;font-family:var(--mono)}
.fresh{display:flex;align-items:center;gap:10px;border:1px solid var(--hair2);background:var(--panel);
  padding:9px 16px;border-radius:11px}
.fresh .dot{width:9px;height:9px;border-radius:50%}
.fresh.live .dot{background:var(--spark);box-shadow:0 0 0 0 rgba(0,229,192,.6);animation:pulse 2.4s infinite}
.fresh.aging .dot{background:var(--amber)}
.fresh.stale .dot{background:var(--rose)}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(0,229,192,.55)}70%{box-shadow:0 0 0 9px rgba(0,229,192,0)}100%{box-shadow:0 0 0 0 rgba(0,229,192,0)}}
@media (prefers-reduced-motion:reduce){.fresh.live .dot{animation:none}}
.fresh .lbl{font-family:var(--mono);font-size:12px;font-weight:600}
.fresh .age{font-family:var(--mono);font-size:11px;color:var(--muted)}
.grid{display:grid;gap:16px}
.g2{grid-template-columns:1.1fr 1fr}
.g3{grid-template-columns:repeat(3,1fr)}
.g4{grid-template-columns:repeat(4,1fr)}
@media(max-width:1050px){.g2,.g3,.g4{grid-template-columns:1fr}}
.panel{background:linear-gradient(165deg,var(--panel),var(--deep));border:1px solid var(--hair);
  border-radius:14px;padding:18px 20px}
.panel h3{margin:0 0 3px;font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px}
.panel .cap{color:var(--muted);font-size:11.5px;margin:0 0 14px;font-family:var(--mono)}
.metric{font-family:var(--mono);font-weight:700;font-size:34px;letter-spacing:-.02em;line-height:1}
.metric.sm{font-size:22px}
.metric .u{font-size:13px;color:var(--muted);font-weight:400;margin-left:4px}
.tag{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10.5px;font-weight:600;
  padding:3px 9px;border-radius:20px;border:1px solid transparent}
.tag::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor}
.t-spark{color:var(--spark);background:rgba(0,229,192,.1);border-color:var(--spark-dim)}
.t-amber{color:var(--amber);background:rgba(255,180,84,.1);border-color:#8a5c1f}
.t-rose{color:var(--rose);background:rgba(255,107,139,.1);border-color:#8a2a44}
.t-genome{color:var(--genome);background:rgba(124,111,255,.12);border-color:var(--genome-dim)}
.t-muted{color:var(--muted);background:rgba(144,137,184,.08);border-color:var(--hair2)}
.stat3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}
.stat3 .cell{text-align:center;border:1px solid var(--hair);border-radius:10px;padding:10px 6px;background:var(--void)}
.stat3 .cell b{display:block;font-family:var(--mono);font-size:19px}
.stat3 .cell span{font-family:var(--mono);font-size:9.5px;color:var(--muted2);text-transform:uppercase;letter-spacing:.08em}
.chart-wrap{margin-top:6px}
.chart-wrap svg{width:100%;height:150px;overflow:visible}
.chart-pt{fill:var(--genome)}
.chart-pt.stag{fill:var(--muted2)}
.chart-line{fill:none;stroke:var(--genome);stroke-width:2.2}
.chart-area{fill:url(#gradFit);opacity:.5}
.chart-axis{stroke:var(--hair);stroke-width:1}
.chart-lbl{font-family:var(--mono);font-size:9px;fill:var(--muted2)}
.row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--hair)}
.row:last-child{border-bottom:none}
.row .name{font-size:13px}
.row .delta{font-family:var(--mono);font-size:12.5px;font-weight:600;color:var(--spark)}
.bar-track{height:6px;border-radius:4px;background:var(--void);border:1px solid var(--hair);overflow:hidden}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--genome-dim),var(--genome))}
.champ{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--hair)}
.champ:last-child{border-bottom:none}
.champ .rank{font-family:var(--mono);font-size:11px;color:var(--muted2);width:16px}
.champ .info{flex:1;min-width:0}
.champ .title{font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.champ .cls{font-family:var(--mono);font-size:10px;color:var(--muted)}
.champ .score{font-family:var(--mono);font-weight:700;font-size:16px;color:var(--genome)}
.gap-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.gap-cell{border:1px solid var(--hair);border-radius:9px;padding:10px 8px;text-align:center;background:var(--void)}
.gap-cell b{display:block;font-family:var(--mono);font-size:20px}
.gap-cell span{font-family:var(--mono);font-size:9px;color:var(--muted2);letter-spacing:.05em}
.lever{border-left:2px solid var(--gold);background:rgba(245,213,71,.06);padding:10px 13px;border-radius:0 9px 9px 0;font-size:12px;color:var(--muted)}
.lever b{color:var(--gold)}
.flow{display:flex;align-items:center;gap:0;margin-top:8px}
.node{border:1px solid var(--hair2);border-radius:12px;padding:16px 20px;text-align:center;min-width:150px}
.node.has{background:rgba(124,111,255,.08)}
.node.hasf{background:rgba(0,229,192,.08)}
.node .t{font-weight:700;font-size:14px}
.node .s{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:2px}
.wire{flex:1;height:2px;background:linear-gradient(90deg,var(--genome-dim),var(--spark-dim));position:relative;min-width:40px}
.brain-core{width:110px;height:110px;border-radius:50%;border:2px solid var(--genome);
  background:radial-gradient(circle,rgba(124,111,255,.18),transparent 70%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 -6px;flex-shrink:0;position:relative;z-index:2}
.brain-core b{font-family:var(--mono);font-size:13px;letter-spacing:.05em}
.brain-core span{font-family:var(--mono);font-size:9px;color:var(--muted)}
.ops-strip{display:flex;justify-content:center;gap:8px;margin-top:14px;flex-wrap:wrap}
.op-chip{font-family:var(--mono);font-size:9.5px;border:1px solid var(--hair2);border-radius:20px;
  padding:4px 11px;color:var(--muted)}
.evidence-strip{margin-top:14px;text-align:center;border:1px dashed var(--hair2);border-radius:10px;
  padding:9px;font-family:var(--mono);font-size:10.5px;color:var(--muted2)}
.verif{font-family:var(--mono);font-size:8.5px;padding:1px 6px;border-radius:8px;margin-left:6px;white-space:nowrap}
.verif.strong{color:var(--spark);background:rgba(0,229,192,.12)}
.verif.basic{color:var(--amber);background:rgba(255,180,84,.12)}
.footer-note{margin-top:20px;font-family:var(--mono);font-size:10.5px;color:var(--muted2);text-align:center}
.footer-note a{color:var(--genome)}
</style>
</head>
<body>
<div id="root">Loading BRAIN console…</div>
<script>
// Bind to the live API endpoint (explicit FastAPI route, always 200) rather than the static
// data/brain_live.json (which the dist-only static mount does not serve). Origin-aware so it works
// over the Tailscale HTTPS host, over plain HTTP, and when opened straight from Finder (file://).
const API_BASE = (location.protocol === 'file:' || location.origin === 'null') ? 'http://127.0.0.1:8000' : '';
const DATA_URL = API_BASE + '/api/brain/live';
const POLL_MS = 60000; // matches observed ~10-15min update cadence w/ generous headroom; see footer note
let lastGoodData = null, lastFetchOk = null;

function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function tag(cls,label){return `<span class="tag ${cls}">${esc(label)}</span>`;}

// Freshness is COMPUTED from the data's own timestamp, never asserted by a static label.
function freshness(tsIso){
  const ageMs = Date.now() - new Date(tsIso).getTime();
  const ageMin = ageMs/60000;
  if (ageMin < 15) return {cls:'live', label:'LIVE', ageMin};
  if (ageMin < 40) return {cls:'aging', label:'AGING', ageMin};
  return {cls:'stale', label:'STALE', ageMin};
}
function fmtAge(min){
  if (min < 1) return '<1 min ago';
  if (min < 60) return `${Math.round(min)} min ago`;
  return `${(min/60).toFixed(1)}h ago`;
}

async function load(){
  try{
    const res = await fetch(DATA_URL, {cache:'no-store'});
    if (!res.ok) throw new Error('HTTP '+res.status);
    const d = await res.json();
    lastGoodData = d; lastFetchOk = true;
  }catch(e){
    lastFetchOk = false;
    console.warn('brain_live.json fetch failed, showing last-known + stale flag:', e);
  }
  render();
}

function buildFitnessChart(history){
  const W=680,H=140,pad=28;
  const scores = history.map(h=>h.m);
  const min = Math.min(...scores)-2, max = Math.max(...scores)+2;
  const xw = (W-pad*2)/(history.length-1);
  const yFor = m => H-pad - ((m-min)/(max-min))*(H-pad*1.6);
  const pts = history.map((h,i)=>[pad+i*xw, yFor(h.m)]);
  const linePath = pts.map((p,i)=>(i===0?'M':'L')+p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
  const areaPath = linePath + ` L${pts[pts.length-1][0]},${H-pad} L${pts[0][0]},${H-pad} Z`;
  const dots = history.map((h,i)=>{
    const stag = h.gain===0 || h.gain===null;
    return `<circle class="chart-pt ${stag?'stag':''}" cx="${pts[i][0].toFixed(1)}" cy="${pts[i][1].toFixed(1)}" r="${i===history.length-1?5:3}">
      <title>Gen ${h.g}: ${h.m.toFixed(1)} (${h.gain===null?'baseline':h.gain===0?'stagnant':'+'+h.gain}) </title></circle>`;
  }).join('');
  const labels = history.map((h,i)=> i%2===0||i===history.length-1 ?
    `<text class="chart-lbl" x="${pts[i][0].toFixed(1)}" y="${H-6}" text-anchor="middle">g${h.g}</text>` : '').join('');
  return `<svg viewBox="0 0 ${W} ${H}">
    <defs><linearGradient id="gradFit" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7C6FFF"/><stop offset="100%" stop-color="#7C6FFF" stop-opacity="0"/>
    </linearGradient></defs>
    <line class="chart-axis" x1="${pad}" y1="${H-pad}" x2="${W-pad}" y2="${H-pad}"/>
    <path class="chart-area" d="${areaPath}"/>
    <path class="chart-line" d="${linePath}"/>
    ${dots}${labels}
  </svg>`;
}

function verifBadge(state){
  // Honest evidence framing: VERIFIED_ON_HELDOUT is stronger proof than GENERATED_AND_JUDGED alone.
  if (state === 'VERIFIED_ON_HELDOUT') return '<span class="verif strong">✓ held-out verified</span>';
  if (state === 'GENERATED_AND_JUDGED') return '<span class="verif basic">judged only</span>';
  return `<span class="verif basic">${esc(state||'unverified')}</span>`;
}

function render(){
  const root = document.getElementById('root');
  if (!lastGoodData){ root.innerHTML = '<div class="wrap">Waiting for brain_live.json…</div>'; return; }
  const d = lastGoodData;
  const fr = freshness(d.ts);
  const connState = lastFetchOk===false ? {cls:'stale', label:'DISCONNECTED', ageMin:fr.ageMin} : fr;

  root.innerHTML = `<div class="wrap">
    <div class="head">
      <div>
        <h1>HOCH — BRAIN Moonshot</h1>
        <div class="sub">self-improving convergence core · generation ${d.generation} · ${esc(d.state)}</div>
      </div>
      <div class="fresh ${connState.cls}">
        <span class="dot"></span>
        <span class="lbl">${connState.label} · ${d.live_brain.backend.model}</span>
        <span class="age">data ${fmtAge(fr.ageMin)}</span>
      </div>
    </div>
    ${renderHero(d)}
    ${renderGaps(d)}
    ${renderMidGrid(d)}
    ${renderFlow(d)}
    <div class="footer-note">freshness computed live from data ts (not a static claim) · poll every 60s ·
      source: <a href="/api/brain/live">/api/brain/live</a> (live endpoint) ·
      upgrade path: SSE push endpoint recommended once brain writer emits on-generation events, not just cadence</div>
  </div>`;
}

function renderHero(d){
  return `<div class="grid g2" style="margin-bottom:16px">
    <div class="panel">
      <h3>Mean Champion Score</h3>
      <p class="cap">across ${d.champions} champions · ${d.genes} genes in the pool</p>
      <div class="metric">${d.mean_score.toFixed(1)} ${tag('t-spark','+' + d.last_gain.toFixed(2) + ' last gain')}</div>
      <div class="stat3">
        <div class="cell"><b>${d.generation}</b><span>generation</span></div>
        <div class="cell"><b>${d.genes}</b><span>genes</span></div>
        <div class="cell"><b>${d.champions}</b><span>champions</span></div>
      </div>
    </div>
    <div class="panel">
      <h3>Evolutionary Trajectory</h3>
      <p class="cap">mean score per generation · flat segments = real stagnation, not missing data</p>
      <div class="chart-wrap">${buildFitnessChart(d.history)}</div>
    </div>
  </div>`;
}

function renderGaps(d){
  const g = d.gaps, bc = g.by_constraint;
  return `<div class="panel" style="margin-bottom:16px">
    <h3>Convergence Constraints <span class="tag t-genome">${esc(d.global_converged?'CONVERGED':'NOT CONVERGED')}</span></h3>
    <p class="cap">what's actually limiting the next generation right now</p>
    <div class="gap-grid">
      <div class="gap-cell"><b style="color:var(--rose)">${bc.SATURATED||0}</b><span>SATURATED</span></div>
      <div class="gap-cell"><b style="color:var(--amber)">${bc.LOW_CEILING||0}</b><span>LOW CEILING</span></div>
      <div class="gap-cell"><b style="color:var(--amber)">${bc.THIN_POOL||0}</b><span>THIN POOL</span></div>
      <div class="gap-cell"><b style="color:var(--rose)">${bc.NO_CHAMPION||0}</b><span>NO CHAMPION</span></div>
    </div>
    <div class="lever"><b>Meta-lever: ${esc(d.meta_lever)}</b> — ${esc(d.meta_reason)}
      <br><span class="mono" style="font-size:10.5px">top-5 champion share: ${(g.top5_share*100).toFixed(1)}% ·
      expansion needed: ${g.expansion_needed_genes} genes · drift flags: ${g.drift}</span></div>
  </div>`;
}

function renderMidGrid(d){
  const maxDelta = Math.max(...d.recent_improvements.map(r=>r.beats_mech), 1);
  const improvementsHtml = d.recent_improvements.map(r=>`
    <div class="row">
      <div class="name">${esc(r.task_class)}<div class="bar-track" style="width:120px;margin-top:4px">
        <div class="bar-fill" style="width:${(r.beats_mech/maxDelta*100).toFixed(0)}%"></div></div></div>
      <div class="delta">+${r.beats_mech.toFixed(1)} <span style="color:var(--muted);font-weight:400">→ ${r.score.toFixed(1)}</span></div>
    </div>`).join('');
  const champsHtml = d.top_champions.map((c,i)=>`
    <div class="champ">
      <div class="rank">${i+1}</div>
      <div class="info"><div class="title">${esc(c.title)}${verifBadge(c.state)}</div>
        <div class="cls">${esc(c.cls)}</div></div>
      <div class="score">${c.score.toFixed(1)}</div>
    </div>`).join('');
  return `<div class="grid g2" style="margin-bottom:16px">
    <div class="panel">
      <h3>Recent Brain Improvements</h3>
      <p class="cap">gain vs. mechanical baseline, by task class · beats_mech field</p>
      ${improvementsHtml}
    </div>
    <div class="panel">
      <h3>Top Champions</h3>
      <p class="cap">held-out verification shown honestly — not every champion is equally proven</p>
      ${champsHtml}
    </div>
  </div>`;
}

function renderFlow(d){
  const ops = ['Harvest','Converge','Generate','Learn','Adversary','Promote','Judge'];
  const facs = (d.factories || []);
  const facNode = f => {
    const st = (f.state || '').toUpperCase();
    const col = (st === 'IMPROVING' || st === 'CONVERGED') ? '#34d399'
              : (st === 'SEEDED') ? '#8b8ba7' : '#e0b341';
    const score = (f.mean_score != null) ? ` · ${(+f.mean_score).toFixed(0)}` : '';
    return `<div class="node hasf" style="min-width:150px">
      <div class="t">${f.code}</div>
      <div class="s">${(f.title||'').replace('Hoch ','').replace(' Factory','')}</div>
      <div style="font-size:11px;color:#8b8ba7;margin-top:6px">${f.genes} genes · ${f.champions} champ${score}</div>
      <div style="font-size:11px;font-weight:700;color:${col};margin-top:2px">● ${st||'—'}</div>
    </div>`;
  };
  const facCol = facs.length
    ? `<div style="display:flex;flex-direction:column;gap:10px">${facs.map(facNode).join('')}</div>`
    : `<div class="node hasf"><div class="t">HASF</div><div class="s">Product Factory</div></div>`;
  return `<div class="panel">
    <h3>HOCH · HAS × BRAIN × Factories</h3>
    <p class="cap">command &amp; control ↔ self-improving core ↔ ${facs.length || 1} product ${facs.length===1?'factory':'factories'}</p>
    <div class="flow">
      <div class="node has"><div class="t">HAS</div><div class="s">Command &amp; Control</div></div>
      <div class="wire"></div>
      <div class="brain-core"><b>BRAIN</b><span>${d.genes} genes</span></div>
      <div class="wire"></div>
      ${facCol}
    </div>
    <div class="ops-strip">${ops.map(o=>`<span class="op-chip">${o}</span>`).join('')}</div>
    <div class="evidence-strip">EVIDENCE LEDGER · RELAY MESH — hoch-relay-001 · hash + timestamp every claim</div>
  </div>`;
}

load();
setInterval(load, POLL_MS);
</script>
</body>
</html>
