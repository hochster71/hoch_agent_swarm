<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HOCH — BRAIN Command Deck</title>
<style>
  :root{
    --bg:#07070f; --panel:#0e0e1c; --panel2:#12122400; --line:#20203a;
    --ink:#ececf6; --mut:#8b8ba7; --dim:#5a5a78;
    --indigo:#7c6cff; --indigo2:#4b3fd6; --green:#34d399; --amber:#e0b341; --red:#f0616d;
    --mono:'SF Mono',ui-monospace,'JetBrains Mono',Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:radial-gradient(1200px 700px at 50% -10%,#12122b 0%,var(--bg) 60%);color:var(--ink);font-family:var(--mono);-webkit-font-smoothing:antialiased}
  .sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
  a{color:var(--indigo)}
  #root{max-width:1560px;margin:0 auto;padding:22px 26px 40px}
  .top{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;flex-wrap:wrap;border-bottom:1px solid var(--line);padding-bottom:14px}
  h1{font-size:22px;margin:0;letter-spacing:.06em}
  h1 .x{color:var(--dim);font-weight:400;margin:0 6px}
  .sub{color:var(--mut);font-size:12px;margin-top:5px;letter-spacing:.04em}
  .status{display:flex;gap:16px;align-items:center;font-size:12px;color:var(--mut)}
  .dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;vertical-align:middle}
  .live .dot{background:var(--green);box-shadow:0 0 10px var(--green);animation:bpulse 1.8s infinite}
  .stale .dot{background:var(--amber);box-shadow:0 0 10px var(--amber)}
  .off .dot{background:var(--red)}
  @keyframes bpulse{0%,100%{opacity:1}50%{opacity:.35}}

  /* ---- deck grid ---- */
  .deck{display:grid;grid-template-columns:230px 1fr 300px;gap:18px;margin-top:20px;align-items:stretch}
  @media(max-width:1100px){.deck{grid-template-columns:1fr}}
  .col{display:flex;flex-direction:column;gap:14px;min-width:0}

  .card,.panel{background:linear-gradient(180deg,#101024,#0c0c18);border:1px solid var(--line);border-radius:14px;padding:16px;position:relative;overflow:hidden}
  .panel{margin-top:16px}
  .card h3,.panel h3{margin:0 0 4px;font-size:11px;letter-spacing:.18em;color:var(--mut);text-transform:uppercase;font-weight:600}

  /* HAS governor */
  .gov{border-color:#2b2550}
  .gov .big{font-size:20px;font-weight:700;letter-spacing:.05em}
  .gov .role{color:var(--mut);font-size:12px;margin-top:2px}
  .badge{display:inline-block;font-size:10px;letter-spacing:.12em;padding:3px 8px;border-radius:999px;border:1px solid var(--line);color:var(--mut);margin-top:12px}

  /* center stage */
  .stage{position:relative;background:linear-gradient(180deg,#0c0c1a,#08080f);border:1px solid var(--line);border-radius:16px;min-height:520px;display:flex;flex-direction:column}
  .stagehd{display:flex;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--line);font-size:11px;letter-spacing:.16em;color:var(--mut);text-transform:uppercase}
  .lever{color:var(--green);font-weight:700;letter-spacing:.1em}
  svg.brainwrap{width:100%;flex:1;display:block}

  /* factory cockpit cards */
  .fac{cursor:pointer;transition:transform .18s,border-color .18s,box-shadow .18s}
  .fac:hover{transform:translateY(-2px);border-color:var(--indigo);box-shadow:0 8px 30px -12px var(--indigo)}
  .fac .fc-top{display:flex;justify-content:space-between;align-items:baseline}
  .fac .code{font-size:18px;font-weight:800;letter-spacing:.04em}
  .fac .dom{font-size:11px;color:var(--mut)}
  .fac .nums{font-size:12px;color:var(--ink);margin-top:8px}
  .fac .nums b{color:#fff}
  .spark{width:100%;height:34px;margin-top:8px;display:block}
  .pill{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-weight:700;letter-spacing:.1em;padding:3px 9px;border-radius:999px;margin-top:9px}
  .pill i{width:7px;height:7px;border-radius:50%;display:inline-block}
  .pi{color:var(--green);background:rgba(52,211,153,.1)} .pi i{background:var(--green);box-shadow:0 0 8px var(--green);animation:bpulse 1.6s infinite}
  .ps{color:var(--indigo);background:rgba(124,108,255,.12)} .ps i{background:var(--indigo)}
  .pd{color:var(--mut);background:rgba(139,139,167,.08)} .pd i{background:var(--mut)}
  .pc{color:var(--amber);background:rgba(224,179,65,.1)} .pc i{background:var(--amber)}

  /* gaps + ledger */
  .gaprow{display:flex;gap:6px;margin-top:6px}
  .gapseg{height:8px;border-radius:3px}
  .kv{display:flex;justify-content:space-between;font-size:11px;color:var(--mut);padding:3px 0}
  .kv b{color:var(--ink)}
  .ledger{margin-top:16px;border:1px dashed var(--line);border-radius:12px;padding:11px 14px;color:var(--dim);font-size:11px;text-align:center;letter-spacing:.05em}
  .foot{margin-top:16px;color:var(--dim);font-size:11px;letter-spacing:.03em;line-height:1.7}

  /* tooltip */
  #tip{position:fixed;pointer-events:none;z-index:50;background:#14142a;border:1px solid var(--indigo);border-radius:10px;padding:10px 12px;font-size:11px;max-width:280px;opacity:0;transition:opacity .12s;box-shadow:0 12px 40px -12px #000}
  #tip .tt{font-weight:700;color:#fff;margin-bottom:5px;letter-spacing:.04em}
  #tip .tl{color:var(--mut);display:flex;justify-content:space-between;gap:14px;padding:1px 0}
  #tip .tl b{color:var(--ink)}

  /* chat dock */
  #chatdock{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);width:min(760px,92vw);z-index:40}
  #chatans{display:none;background:#0e0e20;border:1px solid var(--indigo);border-radius:12px;padding:12px 14px;margin-bottom:8px;font-size:12.5px;line-height:1.6;max-height:38vh;overflow:auto;box-shadow:0 20px 60px -20px #000}
  #chatans .mode{font-size:10px;letter-spacing:.14em;color:var(--indigo);text-transform:uppercase;margin-bottom:6px}
  #chatans .src{margin-top:8px;font-size:11px;color:var(--dim);border-top:1px solid var(--line);padding-top:6px}
  #chatans .dim{color:var(--mut)}
  .chatbar{display:flex;gap:8px;background:#12122a;border:1px solid var(--line);border-radius:12px;padding:8px;box-shadow:0 12px 40px -16px #000}
  #chatq{flex:1;background:transparent;border:0;outline:0;color:var(--ink);font-family:var(--mono);font-size:13px;padding:6px 8px}
  #chatq::placeholder{color:var(--dim)}
  #chatgo{background:var(--indigo);color:#fff;border:0;border-radius:8px;padding:7px 16px;font-family:var(--mono);font-weight:700;cursor:pointer;letter-spacing:.05em}
  #chatgo:hover{background:var(--indigo2)}

  /* security swarms */
  .swarmrow{display:flex;gap:14px;flex-wrap:wrap;margin-top:8px}
  .swarmagent{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;min-width:96px;padding:8px;border-radius:12px;transition:background .15s}
  .swarmagent:hover{background:#14142a}
  .swarmring{width:52px;height:52px;position:relative}
  .swarmring svg{width:52px;height:52px}
  .swarmring .spin{transform-origin:26px 26px;animation:swspin 2.4s linear infinite}
  @keyframes swspin{to{transform:rotate(360deg)}}
  .swarmagent .nm{font-size:12px;font-weight:700;letter-spacing:.02em}
  .swarmagent .rl{font-size:10px;color:var(--mut)}
</style>
</head>
<body>
<h2 class="sr-only">HOCH BRAIN Command Deck — live status of the HAS governor, the self-improving BRAIN, and the HASF, HMF and HRF factories.</h2>
<div id="root"><div style="padding:60px;text-align:center;color:var(--mut)">Connecting to BRAIN…</div></div>
<div id="tip"></div>
<div id="chatdock">
  <div id="chatans"></div>
  <div class="chatbar">
    <input id="chatq" placeholder="Ask the BRAIN…  e.g. which factory is weakest and what should it work on next?" autocomplete="off"/>
    <button id="chatgo">Ask</button>
  </div>
</div>
<script>
const API_BASE = (location.protocol==='file:'||location.origin==='null') ? 'http://127.0.0.1:8000' : '';
const LIVE_URL = API_BASE + '/api/brain/live';
const POLL = 15000;
let last=null, ok=null, tPrev=0;

const esc=s=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const num=(v,d=1)=> (v==null||isNaN(v))?'—':(+v).toFixed(d);
const stCls=s=>{s=(s||'').toUpperCase();return (s==='IMPROVING'||s==='CONVERGED')?'pi':(s==='SELECTED')?'pc':(s==='SEEDED')?'pd':'ps';};
const stCol=s=>{s=(s||'').toUpperCase();return (s==='IMPROVING'||s==='CONVERGED')?'#34d399':(s==='SELECTED')?'#e0b341':(s==='SEEDED')?'#8b8ba7':'#7c6cff';};

async function load(){
  // Primary: live endpoint. Fallback: static file the cadence writes each tick. STALE only if BOTH fail.
  try{ const r=await fetch(LIVE_URL,{cache:'no-store'}); if(!r.ok) throw new Error('HTTP '+r.status);
       last=await r.json(); ok=true; }
  catch(e){
    try{ const r2=await fetch(API_BASE+'/data/brain_live.json?_='+Date.now(),{cache:'no-store'});
         if(!r2.ok) throw new Error('HTTP '+r2.status);
         last=await r2.json(); ok=true; }
    catch(e2){ ok=false; console.warn('both feeds failed, showing last-known + STALE:',e,e2); }
  }
  render();
}

/* ---------- fleet reconcile (dry-run, T3-inert) ---------- */
let fleet=null;
async function loadFleet(){
  // The live feed is authoritative and always carries fleet_reconcile (null until the reconciler runs),
  // so when it's up we never touch the static mirror.
  if(last){ fleet = last.fleet_reconcile || null; render(); return; }
  // Only fall back to the static mirror when the brain feed is CONFIRMED down (ok===false) — not on the
  // first tick before load() has resolved (ok===null). Avoids a spurious 404 on initial page load.
  if(ok===false){
    try{ const r=await fetch(API_BASE+'/data/fleet_reconcile.json?_='+Date.now(),{cache:'no-store'});
         if(r.ok && r.status!==204) fleet=await r.json(); }
    catch(e){ /* NOT-YET-RUN panel; never fabricate a fleet */ }
  }
  render();
}
function renderFleet(){
  const f=fleet;
  if(!f){ return `<div class="panel"><h3>FLEET RECONCILE · dry-run · competing-loop detector</h3>
    <div class="kv" style="color:var(--dim)">not yet run — <code>python3 scripts/hoch_fleet_reconcile.py</code> on the Mac (needs launchctl; no fleet fabricated)</div></div>`; }
  const recs=f.recommendations||[], contested=Object.keys(f.contested_files||{}), acts=f.actions||[];
  const rows = recs.length ? recs.map(r=>`<div class="kv">
      <span style="color:var(--indigo)">${esc(r.contested_file||(r.contested_files||[])[0]||'')}</span>
      <span>keep <b style="color:var(--green)">${esc(r.canonical_owner)}</b></span></div>
      <div class="tl" style="color:var(--dim);margin:2px 0 8px">writers: ${(r.writers||[]).map(esc).join(', ')} · stop (T3, not run): ${(r.bootout_candidates||[]).map(esc).join(', ')||'—'}</div>`).join('')
    : `<div class="kv" style="color:var(--dim)">no same-file contention detected by the heuristic</div>`;
  const inert = f.safety && f.safety.all_actions_pending_operator_T3;
  const unres = f.unresolved||0;
  const unresNote = unres ? ` · <span style="color:#e0b341">${unres} plist(s) unresolved — run on the Mac for full resolution</span>` : '';
  return `<div class="panel"><h3>FLEET RECONCILE · dry-run · ${esc(f.jobs_examined||0)} jobs · ${contested.length} contested file(s)</h3>
    ${rows}
    <div class="tl" style="color:var(--dim);margin-top:4px">source: ${esc(f.job_source||'live launchctl')}${unresNote}</div>
    <div class="tl" style="margin-top:4px;color:${inert?'#34d399':'#e0b341'}">
      ${acts.length} stop action(s) staged · ${inert?'ALL PENDING_OPERATOR_APPROVAL_T3 (executed=false) — nothing stopped':'⚠ verify T3 inert'} · ${esc(f.method||'')}</div></div>`;
}

/* ---------- sparkline ---------- */
function spark(history, col){
  if(!history||history.length<2) return `<svg class="spark" viewBox="0 0 200 34" preserveAspectRatio="none"></svg>`;
  const ms=history.map(h=>h.m), mn=Math.min(...ms), mx=Math.max(...ms), rng=(mx-mn)||1;
  const pts=history.map((h,i)=>[8+i*(184/(history.length-1)), 30-((h.m-mn)/rng)*26]);
  const d=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const area=d+` L${pts[pts.length-1][0].toFixed(1)} 34 L8 34 Z`;
  const last=pts[pts.length-1];
  return `<svg class="spark" viewBox="0 0 200 34" preserveAspectRatio="none">
    <defs><linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="${col}" stop-opacity=".28"/><stop offset="1" stop-color="${col}" stop-opacity="0"/></linearGradient></defs>
    <path d="${area}" fill="url(#sg)"/><path d="${d}" fill="none" stroke="${col}" stroke-width="1.6"/>
    <circle cx="${last[0].toFixed(1)}" cy="${last[1].toFixed(1)}" r="2.6" fill="${col}"><animate attributeName="r" values="2.6;4.2;2.6" dur="1.8s" repeatCount="indefinite"/></circle></svg>`;
}

/* ---------- central living brain (SVG) ---------- */
function brainSVG(d){
  const facs=d.factories||[];
  const cx=430, cy=250, R=64;
  // synapse spokes
  let spokes='';
  for(let i=0;i<18;i++){const a=i*Math.PI*2/18, r1=R+6, r2=R+16+((i%3)*8);
    const x1=cx+Math.cos(a)*r1,y1=cy+Math.sin(a)*r1,x2=cx+Math.cos(a)*r2,y2=cy+Math.sin(a)*r2;
    spokes+=`<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="#7c6cff" stroke-width="1.4" stroke-linecap="round" opacity="${(0.15+((i%4)*0.15)).toFixed(2)}"><animate attributeName="opacity" values="0.1;0.7;0.1" dur="${(2+i%5*0.4).toFixed(1)}s" repeatCount="indefinite" begin="${(i*0.12).toFixed(2)}s"/></line>`;
  }
  // HAS node + axon (left)
  const hasX=70;
  const haWire=`<path id="axHAS" d="M ${hasX+40} ${cy} C 200 ${cy}, 280 ${cy}, ${cx-R} ${cy}" fill="none" stroke="url(#wireg)" stroke-width="1.6"/>`;
  // factory axons (right) — vertical fan
  const fx=800, ys=facs.length? facs.map((_,i)=> 120 + i*(260/Math.max(1,facs.length-1||1))) : [250];
  let facWires='', facParticles='', facNodes='';
  facs.forEach((f,i)=>{
    const y=ys[i], col=stCol(f.state), live=(f.state||'').toUpperCase()==='IMPROVING';
    const id='ax'+i;
    facWires+=`<path id="${id}" d="M ${cx+R} ${cy} C ${cx+150} ${cy}, ${fx-120} ${y}, ${fx-8} ${y}" fill="none" stroke="${col}" stroke-opacity=".5" stroke-width="1.4"/>`;
    // particle flows only when the factory is genuinely live (no fake motion for SEEDED/SELECTED)
    const pcount = live?3:(f.champions>0?1:0);
    for(let p=0;p<pcount;p++){
      facParticles+=`<circle r="2.4" fill="${col}"><animateMotion dur="${(2.6+p*0.5).toFixed(1)}s" repeatCount="indefinite" begin="${(p*0.8).toFixed(1)}s"><mpath href="#${id}"/></animateMotion><animate attributeName="opacity" values="0;1;1;0" dur="${(2.6+p*0.5).toFixed(1)}s" repeatCount="indefinite" begin="${(p*0.8).toFixed(1)}s"/></circle>`;
    }
  });
  // brain-side particles HAS->BRAIN (governance flow, always gentle)
  let govP='';
  for(let p=0;p<2;p++) govP+=`<circle r="2.2" fill="#7c6cff"><animateMotion dur="3s" repeatCount="indefinite" begin="${p*1.5}s"><mpath href="#axHAS"/></animateMotion><animate attributeName="opacity" values="0;1;1;0" dur="3s" repeatCount="indefinite" begin="${p*1.5}s"/></circle>`;

  const brainLive=(d.live_brain&&d.live_brain.live_brain_available);
  const coreCol = brainLive? '#7c6cff':'#4b4b66';

  return `<svg class="brainwrap" viewBox="0 0 870 500" role="img" aria-label="Living BRAIN core feeding factories">
    <defs>
      <radialGradient id="core" cx="50%" cy="50%" r="50%">
        <stop offset="0" stop-color="${coreCol}" stop-opacity=".95"/><stop offset="55%" stop-color="#2a2470" stop-opacity=".9"/><stop offset="100%" stop-color="#0c0c1a" stop-opacity=".2"/></radialGradient>
      <linearGradient id="wireg" x1="0" x2="1"><stop offset="0" stop-color="#7c6cff" stop-opacity=".2"/><stop offset="1" stop-color="#7c6cff" stop-opacity=".7"/></linearGradient>
      <filter id="glow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    </defs>

    ${haWire}${govP}
    ${facWires}${facParticles}

    <!-- HAS node -->
    <g transform="translate(${hasX-38},${cy-34})">
      <rect width="80" height="68" rx="12" fill="#101024" stroke="#2b2550"/>
      <text x="40" y="30" text-anchor="middle" fill="#ececf6" font-size="13" font-weight="700" font-family="var(--mono)">HAS</text>
      <text x="40" y="46" text-anchor="middle" fill="#8b8ba7" font-size="8">GOVERNOR</text>
    </g>

    <!-- pulsing halo rings -->
    <circle cx="${cx}" cy="${cy}" r="${R+22}" fill="none" stroke="${coreCol}" stroke-opacity=".18">
      <animate attributeName="r" values="${R+18};${R+34};${R+18}" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="stroke-opacity" values=".25;0;.25" dur="4s" repeatCount="indefinite"/></circle>
    ${spokes}
    <circle cx="${cx}" cy="${cy}" r="${R}" fill="url(#core)" filter="url(#glow)">
      <animate attributeName="r" values="${R};${R+5};${R}" dur="${brainLive?'2.6s':'5s'}" repeatCount="indefinite"/></circle>
    <text x="${cx}" y="${cy-6}" text-anchor="middle" fill="#fff" font-size="15" font-weight="800" letter-spacing="1" font-family="var(--mono)">BRAIN</text>
    <text x="${cx}" y="${cy+12}" text-anchor="middle" fill="#c9c9ec" font-size="11" font-family="var(--mono)">${d.genes||0} genes</text>
    <text x="${cx}" y="${cy+27}" text-anchor="middle" fill="${brainLive?'#34d399':'#8b8ba7'}" font-size="8" letter-spacing="1" font-family="var(--mono)">${brainLive?'● LIVE '+esc((d.live_brain.backend&&d.live_brain.backend.model)||''):'○ MODEL OFFLINE'}</text>

    <!-- factory anchor dots -->
    ${facs.map((f,i)=>`<circle cx="${fx-4}" cy="${ys[i]}" r="4" fill="${stCol(f.state)}"/>`).join('')}
    <!-- brain hover hitbox: reveal the NIST 800-53 Rev 5 arterial map -->
    <circle cx="${cx}" cy="${cy}" r="${R+22}" fill="transparent" style="cursor:pointer"
       onmousemove="brainTip(evt)" onmouseleave="hideTip()"/>
  </svg>`;
}

/* ---------- factory cockpit card ---------- */
function facCard(f, history){
  const col=stCol(f.state), cls=stCls(f.state);
  // every factory draws its OWN improvement graph from its own convergence history
  const fh = (f.history && f.history.length>1) ? f.history : (f.code==='HASF' ? history : null);
  const spk = fh ? spark(fh,col) : `<svg class="spark" viewBox="0 0 200 34"><text x="8" y="22" fill="#5a5a78" font-size="9" font-family="var(--mono)">awaiting generations…</text></svg>`;
  const mean = f.mean_score!=null ? `<b>${num(f.mean_score,1)}</b> mean` : '<span style="color:var(--dim)">no score yet</span>';
  return `<div class="card fac" data-fac="${esc(f.code)}"
      onmousemove="facTip(event,'${esc(f.code)}')" onmouseleave="hideTip()"
      onclick="typeof sendPrompt==='function'&&sendPrompt('Show ${esc(f.code)} champions and gaps')">
    <div class="fc-top"><span class="code">${esc(f.code)}</span><span class="dom">${esc(f.title.replace('Hoch ','').replace(' Factory',''))}</span></div>
    <div class="nums"><b>${esc(f.genes)}</b> genes · <b>${esc(f.champions)}</b> champ · ${mean}</div>
    ${spk}
    <span class="pill ${cls}"><i></i>${esc((f.state||'—').toUpperCase())}</span>
  </div>`;
}

/* ---------- tooltip ---------- */
const tip=document.getElementById('tip');
function showTip(html,x,y){tip.innerHTML=html;tip.style.opacity=1;const w=tip.offsetWidth,h=tip.offsetHeight;
  tip.style.left=Math.min(x+16,innerWidth-w-10)+'px';tip.style.top=Math.max(10,y-h-12)+'px';}
function hideTip(){tip.style.opacity=0;}
function facTip(e,code){
  const d=last||{}; const f=(d.factories||[]).find(x=>x.code===code); if(!f)return;
  const champs=(d.top_champions||[]).slice(0,4);
  const rows = code==='HASF'
    ? champs.map(c=>{
        const fm=c.fitness_method||'MECHANICAL_PROXY';
        const blended=fm!=='MECHANICAL_PROXY';
        const col=blended?(fm==='BLENDED_CONFIDENT'?'var(--green)':'var(--amber)'):'var(--dim)';
        const badge=blended?` <span style="font-size:9px;color:${col}">${fm.replace('BLENDED_','').toLowerCase()}</span>`:'';
        return `<div class="tl"><span>${esc(c.title||c.cls)}</span>${badge}<b style="color:${col}">${num(c.score,0)}</b></div>`;
      }).join('')
    : `<div class="tl"><span>champions</span><b>${f.champions}</b></div><div class="tl"><span>mean (recipe/agenda readiness)</span><b>${num(f.mean_score,0)}</b></div>`;
  showTip(`<div class="tt">${esc(f.title)}</div>
    <div class="tl"><span>state</span><b style="color:${stCol(f.state)}">${esc((f.state||'').toUpperCase())}</b></div>
    <div class="tl"><span>genes · gates</span><b>${f.genes} · ${f.gates}</b></div>${rows}

        ${n.authority==='MEASURED_LOCAL'?n.cpu+'%':reach?'—':'decl'}
      </td>
      <td>${n.authority==='MEASURED_LOCAL'?n.ram+'%':reach?'—':'decl'}</td>
      <td>${n.authority==='MEASURED_LOCAL'?n.agents:reach?'—':'decl'}</td>
      <td style="font-size:10px;color:var(--dim)">${esc((n.activity||'').slice(0,38))}</td>
    </tr>`;}).join('');
  return `<div class="panel">
    <h3>FLEET · REAL TELEMETRY <span style="color:${degraded?'var(--amber)':'var(--green)'}">· ${esc(f.status)} · ${esc(f.sync)}</span></h3>
    <div class="kv"><span>avg latency</span><b>${esc(f.latency||'—')}</b></div>
    <table style="width:100%;border-collapse:collapse;font-size:12px;margin-top:8px">
      <thead><tr style="color:var(--dim);text-align:left">
        <th>Node</th><th>Status</th><th>Ping</th><th>CPU</th><th>RAM</th><th>Agents</th><th>Activity</th>
      </tr></thead>
      <tbody>${nodeRows}</tbody>
    </table>
    <div style="font-size:11px;color:var(--dim);margin-top:8px">
      ${esc(f.telemetry_note||'')} ·
      <span style="color:var(--green)">●</span> MEASURED_LOCAL = psutil/launchctl on this host ·
      <span style="color:var(--amber)">●</span> DECLARED = roster config, not measured ·
      <span style="color:var(--red)">●</span> UNREACHABLE = no ping response
    </div>
  </div>`;
}

</script>
</body>
</html>
