<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>HAS × HASF — BRAIN Moonshot Console</title>
<style>
:root{--bg:#080b12;--pan:#0f172a;--ln:#1e293b;--mut:#64748b;--txt:#e2e8f0;--teal:#2dd4bf;--vio:#a78bfa;--amber:#fbbf24;--red:#f87171;--grn:#4ade80}
*{box-sizing:border-box}
body{margin:0;background:radial-gradient(1200px 600px at 50% -10%, #0d1830, var(--bg));color:var(--txt);font-family:-apple-system,Segoe UI,Roboto,sans-serif;padding:20px}
.wrap{max-width:1080px;margin:0 auto}
.h{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.h h1{font-size:22px;margin:0;font-weight:800;letter-spacing:-.02em;background:linear-gradient(90deg,#e2e8f0,#2dd4bf);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.chip{font-size:11px;border-radius:20px;padding:4px 11px;border:1px solid;font-weight:600}
.chip.live{color:var(--teal);border-color:var(--teal)}
.chip.off{color:var(--mut);border-color:var(--ln)}
.grid{display:grid;grid-template-columns:320px 1fr;gap:14px;margin-top:14px}
.col{display:flex;flex-direction:column;gap:14px}
.card{background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,.01));border:1px solid var(--ln);border-radius:14px;padding:14px}
.card h3{margin:0 0 10px;font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.6px}
.big{font-size:44px;font-weight:800;line-height:1}
.state{font-size:12px;font-weight:700;border-radius:6px;padding:2px 9px;margin-left:8px;vertical-align:middle}
.s-improving{background:rgba(74,222,128,.16);color:var(--grn)}
.s-converged{background:rgba(45,212,191,.16);color:var(--teal)}
.s-plateauing{background:rgba(251,191,36,.16);color:var(--amber)}
.s-unknown{background:rgba(100,116,139,.2);color:var(--mut)}
.mini{display:flex;gap:8px;margin-top:10px}
.mini div{flex:1;background:var(--pan);border:1px solid var(--ln);border-radius:10px;padding:8px 10px}
.mini .n{font-size:18px;font-weight:700}.mini .t{font-size:9.5px;color:var(--mut);text-transform:uppercase}
.feed div{display:flex;justify-content:space-between;gap:8px;font-size:12.5px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04);animation:fin .5s ease}
.feed .cls{color:#cbd5e1}.feed .up{color:var(--grn);font-weight:700}
@keyframes fin{from{opacity:0;transform:translateX(8px)}to{opacity:1}}
.champ{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;color:#cbd5e1}
.champ .sc{color:var(--teal);font-weight:700}
.foot{color:var(--mut);font-size:11px;margin-top:12px;text-align:center}
.spin{transform-origin:520px 300px;animation:rot 24s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}
.pulse{animation:p 3.4s ease-in-out infinite}@keyframes p{0%,100%{opacity:.55}50%{opacity:1}}
@media(max-width:820px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
<div class="h">
 <div><h1>HAS × HASF — BRAIN Moonshot</h1>
 <div style="color:var(--mut);font-size:12px">self-improving convergence core · live runtime · <span id="ts">—</span></div></div>
 <div class="chip off" id="brainchip">◦ brain offline</div>
</div>

<div class="grid">
 <div class="col">
  <div class="card">
   <h3>Mean champion score</h3>
   <div><span class="big" id="mean">—</span><span class="state s-unknown" id="state">—</span></div>
   <svg id="spark" viewBox="0 0 280 70" width="100%" height="70" style="margin-top:10px"><polyline id="sparkline" fill="none" stroke="#2dd4bf" stroke-width="2" points=""/><polyline id="sparkfill" fill="rgba(45,212,191,.10)" stroke="none" points=""/></svg>
   <div class="mini">
    <div><div class="n" id="gen">—</div><div class="t">generation</div></div>
    <div><div class="n" id="genes">—</div><div class="t">genes</div></div>
    <div><div class="n" id="champs">—</div><div class="t">champions</div></div>
   </div>
  </div>
  <div class="card">
   <h3>Recent brain improvements</h3>
   <div class="feed" id="feed"><div><span class="cls">waiting for a cycle…</span></div></div>
  </div>
  <div class="card">
   <h3>Top champions</h3>
   <div id="champlist"></div>
  </div>
 </div>

 <div class="col">
  <div class="card" style="padding:6px">
   <svg viewBox="0 0 1040 620" width="100%" role="img" font-family="-apple-system,sans-serif">
   <title>Live HAS and HASF orbiting the self-improving BRAIN</title>
   <defs>
    <radialGradient id="lg" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#5eead4" stop-opacity=".5"/><stop offset="50%" stop-color="#22d3ee" stop-opacity=".12"/><stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/></radialGradient>
    <radialGradient id="lc" cx="50%" cy="40%" r="65%"><stop offset="0%" stop-color="#a7f3d0"/><stop offset="55%" stop-color="#2dd4bf"/><stop offset="100%" stop-color="#0e7490"/></radialGradient>
    <linearGradient id="lhas" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1e293b"/><stop offset="100%" stop-color="#0f172a"/></linearGradient>
    <linearGradient id="lhasf" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1e1b4b"/><stop offset="100%" stop-color="#0f0a2e"/></linearGradient>
    <filter id="sf" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="6"/></filter>
    <path id="mHAS" d="M250,300 L452,300" fill="none"/><path id="mHASF" d="M590,300 L810,300" fill="none"/>
    <path id="mLoop" d="M520,150 A150,150 0 1 1 519.9,150" fill="none"/>
   </defs>
   <rect x="0" y="0" width="1040" height="620" rx="14" fill="#0b1220"/>
   <rect x="34" y="200" width="196" height="200" rx="15" fill="url(#lhas)" stroke="#334155" stroke-width="1.5"/>
   <text x="132" y="236" text-anchor="middle" fill="#7dd3fc" font-size="17" font-weight="700">HAS</text>
   <text x="132" y="256" text-anchor="middle" fill="#94a3b8" font-size="10">Command &amp; Control</text>
   <text x="132" y="320" text-anchor="middle" fill="#5eead4" font-size="11" font-weight="600">governs ▸</text>
   <rect x="810" y="200" width="196" height="200" rx="15" fill="url(#lhasf)" stroke="#3730a3" stroke-width="1.5"/>
   <text x="908" y="236" text-anchor="middle" fill="#c4b5fd" font-size="17" font-weight="700">HASF</text>
   <text x="908" y="256" text-anchor="middle" fill="#a5b4fc" font-size="10">Product Factory</text>
   <text x="908" y="320" text-anchor="middle" fill="#5eead4" font-size="11" font-weight="600">▸ powered</text>
   <line x1="250" y1="300" x2="452" y2="300" stroke="#334155" stroke-width="2"/>
   <line x1="590" y1="300" x2="810" y2="300" stroke="#0e7490" stroke-width="2"/>
   <circle cx="520" cy="300" r="170" fill="url(#lg)" class="pulse"/>
   <g class="spin"><circle cx="520" cy="300" r="150" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-opacity=".4" stroke-dasharray="3 10"/></g>
   <text x="520" y="145" text-anchor="middle" fill="#22d3ee" font-size="10.5" letter-spacing="2" font-weight="600">EVIDENCE DISCIPLINE · FAIL-CLOSED</text>
   <circle cx="520" cy="300" r="70" fill="url(#lc)" filter="url(#sf)" class="pulse"/>
   <circle cx="520" cy="300" r="62" fill="#0b1220" stroke="#2dd4bf" stroke-width="2"/>
   <text x="520" y="294" text-anchor="middle" fill="#5eead4" font-size="19" font-weight="800">BRAIN</text>
   <text id="svgGenes" x="520" y="313" text-anchor="middle" fill="#e2e8f0" font-size="11">— genes</text>
   <text id="svgState" x="520" y="329" text-anchor="middle" fill="#64748b" font-size="9.5">—</text>
   <g font-size="10.5" font-weight="600" fill="#e2e8f0" text-anchor="middle">
    <g><circle cx="520" cy="150" r="6" fill="#0b1220" stroke="#2dd4bf" stroke-width="2"><animate attributeName="r" values="6;9;6" dur="2.1s" begin="0s" repeatCount="indefinite"/></circle><text x="520" y="136">Harvest</text></g>
    <g><circle cx="637" cy="206" r="6" fill="#0b1220" stroke="#2dd4bf" stroke-width="2"><animate attributeName="r" values="6;9;6" dur="2.1s" begin=".3s" repeatCount="indefinite"/></circle><text x="681" y="196">Generate</text></g>
    <g><circle cx="666" cy="333" r="6" fill="#0b1220" stroke="#2dd4bf" stroke-width="2"><animate attributeName="r" values="6;9;6" dur="2.1s" begin=".6s" repeatCount="indefinite"/></circle><text x="700" y="337">Adversary</text></g>
    <g><circle cx="585" cy="435" r="6" fill="#0b1220" stroke="#2dd4bf" stroke-width="2"><animate attributeName="r" values="6;9;6" dur="2.1s" begin=".9s" repeatCount="indefinite"/></circle><text x="598" y="455">Judge</text></g>
    <g><circle cx="455" cy="435" r="6" fill="#0b1220" stroke="#2dd4bf" stroke-width="2"><animate attributeName="r" values="6;9;6" dur="2.1s" begin="1.2s" repeatCount="indefinite"/></circle><text x="440" y="455">Promote</text></g>
    <g><circle cx="374" cy="333" r="6" fill="#0b1220" stroke="#2dd4bf" stroke-width="2"><animate attributeName="r" values="6;9;6" dur="2.1s" begin="1.5s" repeatCount="indefinite"/></circle><text x="338" y="337">Learn</text></g>
    <g><circle cx="403" cy="206" r="6" fill="#0b1220" stroke="#2dd4bf" stroke-width="2"><animate attributeName="r" values="6;9;6" dur="2.1s" begin="1.8s" repeatCount="indefinite"/></circle><text x="356" y="196">Converge</text></g>
   </g>
   <rect x="250" y="540" width="540" height="56" rx="13" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
   <text x="520" y="566" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="700">EVIDENCE LEDGER · RELAY MESH</text>
   <text x="520" y="583" text-anchor="middle" fill="#64748b" font-size="10">hoch-relay-001 · hash + timestamp every claim</text>
   <circle r="4" fill="#7dd3fc"><animateMotion dur="2.2s" repeatCount="indefinite"><mpath href="#mHAS"/></animateMotion></circle>
   <circle r="4" fill="#5eead4"><animateMotion dur="2.2s" repeatCount="indefinite"><mpath href="#mHASF"/></animateMotion></circle>
   <circle r="4.5" fill="#2dd4bf"><animateMotion dur="7s" repeatCount="indefinite" rotate="auto"><mpath href="#mLoop"/></animateMotion></circle>
   <circle r="3.5" fill="#a7f3d0"><animateMotion dur="7s" begin="2.3s" repeatCount="indefinite"><mpath href="#mLoop"/></animateMotion></circle>
   <circle r="3.5" fill="#a7f3d0"><animateMotion dur="7s" begin="4.6s" repeatCount="indefinite"><mpath href="#mLoop"/></animateMotion></circle>
   </svg>
  </div>
 </div>
</div>
<div class="foot" id="foot">binding to live runtime feed…</div>
</div>

<script>
const $=id=>document.getElementById(id);
function stateClass(s){return 's-'+(s||'unknown').toLowerCase().replace(/[^a-z]/g,'');}
function drawSpark(hist){
  if(!hist||hist.length<2){return;}
  const ms=hist.map(h=>h.m).filter(x=>x!=null); if(ms.length<2)return;
  const min=Math.min(...ms), max=Math.max(...ms), span=(max-min)||1;
  const W=280,H=70,pad=6;
  const pts=ms.map((m,i)=>{const x=pad+i*((W-2*pad)/(ms.length-1));const y=H-pad-((m-min)/span)*(H-2*pad);return x.toFixed(1)+','+y.toFixed(1);});
  $('sparkline').setAttribute('points',pts.join(' '));
  $('sparkfill').setAttribute('points', `${pad},${H-pad} `+pts.join(' ')+` ${W-pad},${H-pad}`);
}
async function refresh(){
  try{
    let d;
    try{ d=await (await fetch('/api/brain/live',{cache:'no-store'})).json(); }
    catch(_){ d=await (await fetch('/data/brain_live.json?_='+Date.now(),{cache:'no-store'})).json(); }
    const lb=d.live_brain||{};
    $('brainchip').className='chip '+(lb.live_brain_available?'live':'off');
    $('brainchip').textContent=lb.live_brain_available?('● live brain · '+(lb.backend&&lb.backend.model||'local')):'◦ brain offline (start Ollama)';
    $('mean').textContent=(d.mean_score??0).toFixed(1);
    $('state').textContent=d.state||'—'; $('state').className='state '+stateClass(d.state);
    $('gen').textContent=d.generation??'—'; $('genes').textContent=d.genes??'—'; $('champs').textContent=d.champions??'—';
    $('svgGenes').textContent=(d.genes??'—')+' genes'; $('svgState').textContent=(d.state||'—').toLowerCase();
    drawSpark(d.history);
    const f=$('feed'); const imp=d.recent_improvements||[];
    f.innerHTML = imp.length ? imp.map(i=>`<div><span class="cls">${i.task_class}</span><span class="up">+${(i.beats_mech??0).toFixed(1)}</span></div>`).join('') : '<div><span class="cls">no improvements yet this run</span></div>';
    $('champlist').innerHTML=(d.top_champions||[]).map(c=>`<div class="champ"><span>${c.title||c.cls}</span><span class="sc">${(c.score??0).toFixed(1)}</span></div>`).join('');
    $('ts').textContent='live · '+new Date().toLocaleTimeString();
    $('foot').textContent='bound to live runtime feed ✓ (frontend/data/brain_live.json, refreshed by the 30-min cadence)';
  }catch(e){
    $('foot').textContent='live feed not found yet — run scripts/write_brain_live.py or wait for a cadence tick';
  }
}
refresh(); setInterval(refresh, 15000);
</script>
</body>
</html>
